apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization
namespace: jira-agent-dashboard
resources:
  - namespace.yaml
  - pvc.yaml
  - dashboard-deployment.yaml
  - dashboard-route.yaml
  - scraper-cronjob.yaml
  - gcp-wif-config.yaml
  - networkpolicy.yaml
  - rbac.yaml
# Secrets are NOT included — apply them manually from secrets.yaml.example
# to prevent accidental credential commits.
