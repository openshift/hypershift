apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: dashboard-allow-ingress
  namespace: jira-agent-dashboard
spec:
  podSelector:
    matchLabels:
      app: jira-agent-dashboard
      component: dashboard
  policyTypes:
    - Ingress
  ingress:
    - from:
        - namespaceSelector:
            matchLabels:
              network.openshift.io/policy-group: ingress
      ports:
        - port: 4443
          protocol: TCP
        - port: 8080
          protocol: TCP
---
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: deny-all-scraper
  namespace: jira-agent-dashboard
spec:
  podSelector:
    matchLabels:
      app: jira-agent-dashboard
      component: scraper
  policyTypes:
    - Ingress
  ingress: []
