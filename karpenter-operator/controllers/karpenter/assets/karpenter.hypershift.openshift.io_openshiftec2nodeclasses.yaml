---
apiVersion: apiextensions.k8s.io/v1
kind: CustomResourceDefinition
metadata:
  annotations:
    controller-gen.kubebuilder.io/version: v0.15.0
  name: openshiftec2nodeclasses.karpenter.hypershift.openshift.io
spec:
  group: karpenter.hypershift.openshift.io
  names:
    kind: OpenshiftEC2NodeClass
    listKind: OpenshiftEC2NodeClassList
    plural: openshiftec2nodeclasses
    shortNames:
    - oec2nc
    - oec2ncs
    singular: openshiftec2nodeclass
  scope: Cluster
  versions:
  - additionalPrinterColumns:
    - jsonPath: .status.conditions[?(@.type=="Ready")].status
      name: Ready
      type: string
    name: v1beta1
    schema:
      openAPIV3Schema:
        description: OpenshiftEC2NodeClass defines the desired state of OpenshiftEC2NodeClass.
        properties:
          apiVersion:
            description: |-
              APIVersion defines the versioned schema of this representation of an object.
              Servers should convert recognized schemas to the latest internal value, and
              may reject unrecognized values.
              More info: https://git.k8s.io/community/contributors/devel/sig-architecture/api-conventions.md#resources
            type: string
          kind:
            description: |-
              Kind is a string value representing the REST resource this object represents.
              Servers may infer this from the endpoint the client submits requests to.
              Cannot be updated.
              In CamelCase.
              More info: https://git.k8s.io/community/contributors/devel/sig-architecture/api-conventions.md#types-kinds
            type: string
          metadata:
            type: object
          spec:
            description: spec defines the desired state of the OpenshiftEC2NodeClass.
            minProperties: 1
            properties:
              blockDeviceMappings:
                description: |-
                  blockDeviceMappings to be applied to provisioned nodes.
                  For OpenShift nodes, a default root volume size of 120Gi and type gp3 is set if no blockDeviceMapping overrides are specified.
                items:
                  description: BlockDeviceMapping defines a block device mapping for
                    a node.
                  minProperties: 1
                  properties:
                    deviceName:
                      description: deviceName is the device name (for example, /dev/sdh
                        or xvdh).
                      maxLength: 256
                      minLength: 1
                      type: string
                    ebs:
                      description: ebs contains parameters used to automatically set
                        up EBS volumes when an instance is launched.
                      minProperties: 1
                      properties:
                        deleteOnTermination:
                          description: deleteOnTermination indicates whether the EBS
                            volume is deleted on instance termination.
                          enum:
                          - Delete
                          - Retain
                          type: string
                        encrypted:
                          description: |-
                            encrypted indicates whether the EBS volume is encrypted. Encrypted volumes can only
                            be attached to instances that support Amazon EBS encryption. If you are creating
                            a volume from a snapshot, you can't specify an encryption value.
                          enum:
                          - Encrypted
                          - Unencrypted
                          type: string
                        iops:
                          description: |-
                            iops is the number of I/O operations per second (IOPS). For gp3, io1, and io2 volumes,
                            this represents the number of IOPS that are provisioned for the volume. For
                            gp2 volumes, this represents the baseline performance of the volume and the
                            rate at which the volume accumulates I/O credits for bursting.

                            The following are the supported values for each volume type:

                               * gp3: 3,000-16,000 IOPS

                               * io1: 100-64,000 IOPS

                               * io2: 100-64,000 IOPS

                            For io1 and io2 volumes, we guarantee 64,000 IOPS only for Instances built
                            on the Nitro System (https://docs.aws.amazon.com/AWSEC2/latest/UserGuide/instance-types.html#ec2-nitro-instances).
                            Other instance families guarantee performance up to 32,000 IOPS.

                            This parameter is supported for io1, io2, and gp3 volumes only. This parameter
                            is not supported for gp2, st1, sc1, or standard volumes.
                          format: int64
                          type: integer
                        kmsKeyID:
                          description: kmsKeyID is the ARN of the symmetric Key Management
                            Service (KMS) CMK used for encryption.
                          maxLength: 2048
                          minLength: 1
                          type: string
                        snapshotID:
                          description: snapshotID is the ID of an EBS snapshot.
                          maxLength: 256
                          minLength: 1
                          type: string
                        throughput:
                          description: |-
                            throughput to provision for a gp3 volume, with a maximum of 1,000 MiB/s.
                            Valid Range: Minimum value of 125. Maximum value of 1000.
                          format: int64
                          type: integer
                        volumeSizeGiB:
                          description: |-
                            volumeSizeGiB is the size of the volume in GiB. You must specify either a snapshot ID or
                            a volume size. The following are the supported volume sizes for each volume type:

                               * gp2 and gp3: 1-16,384

                               * io1 and io2: 4-16,384

                               * st1 and sc1: 125-16,384

                               * standard: 1-1,024
                          format: int64
                          maximum: 65536
                          minimum: 1
                          type: integer
                        volumeType:
                          description: |-
                            volumeType is the type of the block device.
                            For more information, see Amazon EBS volume types (https://docs.aws.amazon.com/AWSEC2/latest/UserGuide/EBSVolumeTypes.html)
                            in the Amazon Elastic Compute Cloud User Guide.
                          enum:
                          - Standard
                          - IO1
                          - IO2
                          - GP2
                          - SC1
                          - ST1
                          - GP3
                          type: string
                      type: object
                      x-kubernetes-validations:
                      - message: snapshotID or volumeSizeGiB must be defined
                        rule: has(self.snapshotID) || has(self.volumeSizeGiB)
                    rootVolume:
                      description: |-
                        rootVolume indicates whether this device is mounted as kubelet root dir. You can
                        configure at most one root volume in BlockDeviceMappings.
                      enum:
                      - RootVolume
                      - NotRootVolume
                      type: string
                  type: object
                maxItems: 50
                minItems: 1
                type: array
                x-kubernetes-list-type: atomic
                x-kubernetes-validations:
                - message: must have only one blockDeviceMappings with rootVolume
                  rule: self.filter(x, has(x.rootVolume)?x.rootVolume=='RootVolume':false).size()
                    <= 1
              instanceStorePolicy:
                description: instanceStorePolicy specifies how to handle instance-store
                  disks.
                enum:
                - RAID0
                type: string
              ipAddressAssociation:
                description: |-
                  ipAddressAssociation controls the IP address assignment for instances launched with the nodeclass.
                  Valid values are:
                  - "Public": assigns public IP addresses to instances, allowing direct internet access.
                  - "SubnetDefault": defers IP address assignment to the subnet configuration.
                  When unset, the cloud provider's subnet default behavior is used.
                enum:
                - Public
                - SubnetDefault
                type: string
              kubelet:
                description: |-
                  kubelet configures kubelet settings for nodes provisioned by this NodeClass.
                  These settings are injected into the node's ignition configuration via MachineConfig.
                minProperties: 1
                properties:
                  allowedUnsafeSysctls:
                    description: |-
                      A comma separated whitelist of unsafe sysctls or sysctl patterns (ending in `*`).
                      Unsafe sysctl groups are `kernel.shm*`, `kernel.msg*`, `kernel.sem`, `fs.mqueue.*`,
                      and `net.*`. For example: "`kernel.msg*,net.ipv4.route.min_pmtu`"
                      Default: []
                    items:
                      type: string
                    type: array
                  containerLogMaxFiles:
                    description: |-
                      containerLogMaxFiles specifies the maximum number of container log files that can
                      be present for a container.
                      Default: 5
                    format: int32
                    type: integer
                  containerLogMaxSize:
                    description: |-
                      containerLogMaxSize is a quantity defining the maximum size of the container log
                      file before it is rotated. For example: "5Mi" or "256Ki".
                      Default: "10Mi"
                    type: string
                  containerLogMaxWorkers:
                    description: |-
                      ContainerLogMaxWorkers specifies the maximum number of concurrent workers to spawn
                      for performing the log rotate operations. Set this count to 1 for disabling the
                      concurrent log rotation workflows
                      Default: 1
                    format: int32
                    type: integer
                  containerLogMonitorInterval:
                    description: |-
                      ContainerLogMonitorInterval specifies the duration at which the container logs are monitored
                      for performing the log rotate operation. This defaults to 10 * time.Seconds. But can be
                      customized to a smaller value based on the log generation rate and the size required to be
                      rotated against
                      Default: 10s
                    type: string
                  cpuCFSQuota:
                    description: |-
                      cpuCFSQuota enables CPU CFS quota enforcement for containers that
                      specify CPU limits.
                      Default: true
                    type: boolean
                  cpuCFSQuotaPeriod:
                    description: |-
                      cpuCFSQuotaPeriod is the CPU CFS quota period value, `cpu.cfs_period_us`.
                      The value must be between 1 ms and 1 second, inclusive.
                      Requires the CustomCPUCFSQuotaPeriod feature gate to be enabled.
                      Default: "100ms"
                    type: string
                  enableControllerAttachDetach:
                    description: |-
                      enableControllerAttachDetach enables the Attach/Detach controller to
                      manage attachment/detachment of volumes scheduled to this node, and
                      disables kubelet from executing any attach/detach operations.
                      Note: attaching/detaching CSI volumes is not supported by the kubelet,
                      so this option needs to be true for that use case.
                      Default: true
                    type: boolean
                  eventBurst:
                    description: |-
                      eventBurst is the maximum size of a burst of event creations, temporarily
                      allows event creations to burst to this number, while still not exceeding
                      eventRecordQPS. This field canot be a negative number and it is only used
                      when eventRecordQPS > 0.
                      Default: 100
                    format: int32
                    type: integer
                  eventRecordQPS:
                    description: |-
                      eventRecordQPS is the maximum event creations per second. If 0, there
                      is no limit enforced. The value cannot be a negative number.
                      Default: 50
                    format: int32
                    type: integer
                  evictionHard:
                    additionalProperties:
                      type: string
                    description: |-
                      evictionHard is a map of signal names to quantities that defines hard eviction
                      thresholds. For example: `{"memory.available": "300Mi"}`.
                      To explicitly disable, pass a 0% or 100% threshold on an arbitrary resource.
                      Default:
                        memory.available:  "100Mi"
                        nodefs.available:  "10%"
                        nodefs.inodesFree: "5%"
                        imagefs.available: "15%"
                    type: object
                  evictionMaxPodGracePeriod:
                    description: |-
                      evictionMaxPodGracePeriod is the maximum allowed grace period (in seconds) to use
                      when terminating pods in response to a soft eviction threshold being met. This value
                      effectively caps the Pod's terminationGracePeriodSeconds value during soft evictions.
                      Default: 0
                    format: int32
                    type: integer
                  evictionMinimumReclaim:
                    additionalProperties:
                      type: string
                    description: |-
                      evictionMinimumReclaim is a map of signal names to quantities that defines minimum reclaims,
                      which describe the minimum amount of a given resource the kubelet will reclaim when
                      performing a pod eviction while that resource is under pressure.
                      For example: `{"imagefs.available": "2Gi"}`.
                      Default: nil
                    type: object
                  evictionPressureTransitionPeriod:
                    description: |-
                      evictionPressureTransitionPeriod is the duration for which the kubelet has to wait
                      before transitioning out of an eviction pressure condition.
                      Default: "5m"
                    type: string
                  evictionSoft:
                    additionalProperties:
                      type: string
                    description: |-
                      evictionSoft is a map of signal names to quantities that defines soft eviction thresholds.
                      For example: `{"memory.available": "300Mi"}`.
                      Default: nil
                    type: object
                  evictionSoftGracePeriod:
                    additionalProperties:
                      type: string
                    description: |-
                      evictionSoftGracePeriod is a map of signal names to quantities that defines grace
                      periods for each soft eviction signal. For example: `{"memory.available": "30s"}`.
                      Default: nil
                    type: object
                  failSwapOn:
                    description: |-
                      failSwapOn tells the Kubelet to fail to start if swap is enabled on the node.
                      Default: true
                    type: boolean
                  imageGCHighThresholdPercent:
                    description: |-
                      imageGCHighThresholdPercent is the percent of disk usage after which
                      image garbage collection is always run. The percent is calculated by
                      dividing this field value by 100, so this field must be between 0 and
                      100, inclusive. When specified, the value must be greater than
                      imageGCLowThresholdPercent.
                      Default: 85
                    format: int32
                    type: integer
                  imageGCLowThresholdPercent:
                    description: |-
                      imageGCLowThresholdPercent is the percent of disk usage before which
                      image garbage collection is never run. Lowest disk usage to garbage
                      collect to. The percent is calculated by dividing this field value by 100,
                      so the field value must be between 0 and 100, inclusive. When specified, the
                      value must be less than imageGCHighThresholdPercent.
                      Default: 80
                    format: int32
                    type: integer
                  imageMaximumGCAge:
                    description: |-
                      imageMaximumGCAge is the maximum age an image can be unused before it is garbage collected.
                      The default of this field is "0s", which disables this field--meaning images won't be garbage
                      collected based on being unused for too long.
                      Default: "0s" (disabled)
                    type: string
                  imageMinimumGCAge:
                    description: |-
                      imageMinimumGCAge is the minimum age for an unused image before it is
                      garbage collected.
                      Default: "2m"
                    type: string
                  kubeAPIBurst:
                    description: |-
                      kubeAPIBurst is the burst to allow while talking with kubernetes API server.
                      This field cannot be a negative number.
                      Default: 100
                    format: int32
                    type: integer
                  kubeAPIQPS:
                    description: |-
                      kubeAPIQPS is the QPS to use while talking with kubernetes apiserver.
                      Default: 50
                    format: int32
                    type: integer
                  kubeReserved:
                    additionalProperties:
                      type: string
                    description: |-
                      kubeReserved is a set of ResourceName=ResourceQuantity (e.g. cpu=200m,memory=150G) pairs
                      that describe resources reserved for kubernetes system components.
                      Currently cpu, memory and local storage for root file system are supported.
                      See https://kubernetes.io/docs/tasks/administer-cluster/reserve-compute-resources
                      for more details.
                      Default: nil
                    type: object
                  localStorageCapacityIsolation:
                    description: |-
                      LocalStorageCapacityIsolation enables local ephemeral storage isolation feature. The default setting is true.
                      This feature allows users to set request/limit for container's ephemeral storage and manage it in a similar way
                      as cpu and memory. It also allows setting sizeLimit for emptyDir volume, which will trigger pod eviction if disk
                      usage from the volume exceeds the limit.
                      This feature depends on the capability of detecting correct root file system disk usage. For certain systems,
                      such as kind rootless, if this capability cannot be supported, the feature LocalStorageCapacityIsolation should be
                      disabled. Once disabled, user should not set request/limit for container's ephemeral storage, or sizeLimit for emptyDir.
                      Default: true
                    type: boolean
                  maxOpenFiles:
                    description: |-
                      maxOpenFiles is Number of files that can be opened by Kubelet process.
                      The value must be a non-negative number.
                      Default: 1000000
                    format: int64
                    type: integer
                  maxParallelImagePulls:
                    description: |-
                      MaxParallelImagePulls sets the maximum number of image pulls in parallel.
                      This field cannot be set if SerializeImagePulls is true.
                      Setting it to nil means no limit.
                      Default: nil
                    format: int32
                    type: integer
                  maxPods:
                    description: |-
                      maxPods is the maximum number of Pods that can run on this Kubelet.
                      The value must be a non-negative integer.
                      Default: 110
                    format: int32
                    type: integer
                  nodeStatusMaxImages:
                    description: |-
                      nodeStatusMaxImages caps the number of images reported in Node.status.images.
                      The value must be greater than -2.
                      Note: If -1 is specified, no cap will be applied. If 0 is specified, no image is returned.
                      Default: 50
                    format: int32
                    type: integer
                  nodeStatusReportFrequency:
                    description: |-
                      nodeStatusReportFrequency is the frequency that kubelet posts node
                      status to master if node status does not change. Kubelet will ignore this
                      frequency and post node status immediately if any change is detected. It is
                      only used when node lease feature is enabled. nodeStatusReportFrequency's
                      default value is 5m. But if nodeStatusUpdateFrequency is set explicitly,
                      nodeStatusReportFrequency's default value will be set to
                      nodeStatusUpdateFrequency for backward compatibility.
                      Default: "5m"
                    type: string
                  nodeStatusUpdateFrequency:
                    description: |-
                      nodeStatusUpdateFrequency is the frequency that kubelet computes node
                      status. If node lease feature is not enabled, it is also the frequency that
                      kubelet posts node status to master.
                      Note: When node lease feature is not enabled, be cautious when changing the
                      constant, it must work with nodeMonitorGracePeriod in nodecontroller.
                      Default: "10s"
                    type: string
                  oomScoreAdj:
                    description: |-
                      oomScoreAdj is The oom-score-adj value for kubelet process. Values
                      must be within the range [-1000, 1000].
                      Default: -999
                    format: int32
                    type: integer
                  podPidsLimit:
                    description: |-
                      podPidsLimit is the maximum number of PIDs in any pod.
                      Default: -1
                    format: int64
                    type: integer
                  podsPerCore:
                    description: |-
                      podsPerCore is the maximum number of pods per core. Cannot exceed maxPods.
                      The value must be a non-negative integer.
                      If 0, there is no limit on the number of Pods.
                      Default: 0
                    format: int32
                    type: integer
                  protectKernelDefaults:
                    description: |-
                      protectKernelDefaults, if true, causes the Kubelet to error if kernel
                      flags are not as it expects. Otherwise the Kubelet will attempt to modify
                      kernel flags to match its expectation.
                      Default: false
                    type: boolean
                  qosReserved:
                    additionalProperties:
                      type: string
                    description: |-
                      qosReserved is a set of resource name to percentage pairs that specify
                      the minimum percentage of a resource reserved for exclusive use by the
                      guaranteed QoS tier.
                      Currently supported resources: "memory"
                      Requires the QOSReserved feature gate to be enabled.
                      Default: nil
                    type: object
                  registryBurst:
                    description: |-
                      registryBurst is the maximum size of bursty pulls, temporarily allows
                      pulls to burst to this number, while still not exceeding registryPullQPS.
                      The value must not be a negative number.
                      Only used if registryPullQPS is greater than 0.
                      Default: 10
                    format: int32
                    type: integer
                  registryPullQPS:
                    description: |-
                      registryPullQPS is the limit of registry pulls per second.
                      The value must not be a negative number.
                      Setting it to 0 means no limit.
                      Default: 5
                    format: int32
                    type: integer
                  resolvConf:
                    description: |-
                      resolvConf is the resolver configuration file used as the basis
                      for the container DNS resolution configuration.
                      If set to the empty string, will override the default and effectively disable DNS lookups.
                      Default: "/etc/resolv.conf"
                    type: string
                  seccompDefault:
                    description: |-
                      SeccompDefault enables the use of `RuntimeDefault` as the default seccomp profile for all workloads.
                      Default: false
                    type: boolean
                  serializeImagePulls:
                    description: |-
                      serializeImagePulls when enabled, tells the Kubelet to pull images one
                      at a time. We recommend *not* changing the default value on nodes that
                      run docker daemon with version  < 1.9 or an Aufs storage backend.
                      Issue #10959 has more details.
                      Default: true
                    type: boolean
                  singleProcessOOMKill:
                    description: |-
                      singleProcessOOMKill, if true, will prevent the `memory.oom.group` flag from being set for container
                      cgroups in cgroups v2. This causes processes in the container to be OOM killed individually instead of as
                      a group. It means that if true, the behavior aligns with the behavior of cgroups v1.
                      The default value is determined automatically when you don't specify.
                      On non-linux such as windows, only null / absent is allowed.
                      On cgroup v1 linux, only null / absent and true are allowed.
                      On cgroup v2 linux, null / absent, true and false are allowed. The default value is false.
                    type: boolean
                  streamingConnectionIdleTimeout:
                    description: |-
                      streamingConnectionIdleTimeout is the maximum time a streaming connection
                      can be idle before the connection is automatically closed.
                      Default: "4h"
                    type: string
                  systemReserved:
                    additionalProperties:
                      type: string
                    description: |-
                      systemReserved is a set of ResourceName=ResourceQuantity (e.g. cpu=200m,memory=150G)
                      pairs that describe resources reserved for non-kubernetes components.
                      Currently only cpu and memory are supported.
                      See https://kubernetes.io/docs/tasks/administer-cluster/reserve-compute-resources for more detail.
                      Default: nil
                    type: object
                type: object
              monitoring:
                description: |-
                  monitoring controls the monitoring level for instances that are launched.
                  For more information, see Basic monitoring and detailed monitoring
                  (https://docs.aws.amazon.com/AmazonCloudWatch/latest/monitoring/cloudwatch-metrics-basic-detailed.html).
                  Valid values are:
                  - "Detailed": enables detailed monitoring.
                  - "Basic": enables basic monitoring.
                  When unset, the cloud provider's default basic monitoring behavior is used.
                enum:
                - Detailed
                - Basic
                type: string
              securityGroupSelectorTerms:
                description: securityGroupSelectorTerms is a list of or security group
                  selector terms. The terms are ORed.
                items:
                  description: |-
                    SecurityGroupSelectorTerm defines selection logic for a security group used by Karpenter to launch nodes.
                    If multiple fields are used for selection, the requirements are ANDed.
                  minProperties: 1
                  properties:
                    id:
                      description: |-
                        id is the security group id in EC2.
                        The expected format is "sg-" followed by alphanumeric characters, e.g. "sg-0a1b2c3d4e5f".
                      maxLength: 256
                      minLength: 1
                      type: string
                      x-kubernetes-validations:
                      - message: id must match the pattern sg-[0-9a-z]+
                        rule: self.matches('^sg-[0-9a-z]+$')
                    name:
                      description: |-
                        name is the security group name in EC2.
                        This value is the name field, which is different from the name tag.
                      maxLength: 256
                      minLength: 1
                      type: string
                    tags:
                      additionalProperties:
                        type: string
                      description: |-
                        tags is a map of key/value tags used to select security groups.
                        Specifying '*' for a value selects all values for a given tag key.
                        The expected format is {"key1": "value1", "key2": "*"}.
                      maxProperties: 20
                      minProperties: 1
                      type: object
                      x-kubernetes-validations:
                      - message: empty tag keys or values aren't supported
                        rule: self.all(k, k != '' && self[k] != '')
                  type: object
                maxItems: 30
                minItems: 1
                type: array
                x-kubernetes-list-type: atomic
                x-kubernetes-validations:
                - message: securityGroupSelectorTerms cannot be empty
                  rule: self.size() != 0
                - message: expected at least one, got none, ['tags', 'id', 'name']
                  rule: self.all(x, has(x.tags) || has(x.id) || has(x.name))
                - message: '''id'' is mutually exclusive, cannot be set with a combination
                    of other fields in securityGroupSelectorTerms'
                  rule: '!self.all(x, has(x.id) && (has(x.tags) || has(x.name)))'
                - message: '''name'' is mutually exclusive, cannot be set with a combination
                    of other fields in securityGroupSelectorTerms'
                  rule: '!self.all(x, has(x.name) && (has(x.tags) || has(x.id)))'
              subnetSelectorTerms:
                description: subnetSelectorTerms is a list of or subnet selector terms.
                  The terms are ORed.
                items:
                  description: |-
                    SubnetSelectorTerm defines selection logic for a subnet used by Karpenter to launch nodes.
                    If multiple fields are used for selection, the requirements are ANDed.
                  minProperties: 1
                  properties:
                    id:
                      description: |-
                        id is the subnet id in EC2.
                        The expected format is "subnet-" followed by alphanumeric characters, e.g. "subnet-0a1b2c3d4e5f".
                      maxLength: 256
                      minLength: 1
                      type: string
                      x-kubernetes-validations:
                      - message: id must match the pattern subnet-[0-9a-z]+
                        rule: self.matches('^subnet-[0-9a-z]+$')
                    tags:
                      additionalProperties:
                        type: string
                      description: |-
                        tags is a map of key/value tags used to select subnets.
                        Specifying '*' for a value selects all values for a given tag key.
                        The expected format is {"key1": "value1", "key2": "*"}.
                      maxProperties: 20
                      minProperties: 1
                      type: object
                      x-kubernetes-validations:
                      - message: empty tag keys or values aren't supported
                        rule: self.all(k, k != '' && self[k] != '')
                  type: object
                maxItems: 30
                minItems: 1
                type: array
                x-kubernetes-list-type: atomic
                x-kubernetes-validations:
                - message: subnetSelectorTerms cannot be empty
                  rule: self.size() != 0
                - message: expected at least one, got none, ['tags', 'id']
                  rule: self.all(x, has(x.tags) || has(x.id))
                - message: '''id'' is mutually exclusive, cannot be set with a combination
                    of other fields in subnetSelectorTerms'
                  rule: '!self.all(x, has(x.id) && has(x.tags))'
              tags:
                additionalProperties:
                  type: string
                description: tags to be applied on ec2 resources like instances and
                  launch templates.
                minProperties: 1
                type: object
                x-kubernetes-validations:
                - message: empty tag keys aren't supported
                  rule: self.all(k, k != '')
                - message: tag contains a restricted tag matching eks:eks-cluster-name
                  rule: self.all(k, k !='eks:eks-cluster-name')
                - message: tag contains a restricted tag matching kubernetes.io/cluster/
                  rule: self.all(k, !k.startsWith('kubernetes.io/cluster') )
                - message: tag contains a restricted tag matching karpenter.sh/nodepool
                  rule: self.all(k, k != 'karpenter.sh/nodepool')
                - message: tag contains a restricted tag matching karpenter.sh/nodeclaim
                  rule: self.all(k, k !='karpenter.sh/nodeclaim')
                - message: tag contains a restricted tag matching karpenter.k8s.aws/ec2nodeclass
                  rule: self.all(k, k !='karpenter.k8s.aws/ec2nodeclass')
              version:
                description: |-
                  version is an OpenShift version (e.g., "4.20.1") specifying the release version
                  for nodes managed by this NodeClass. When set, the controller resolves this to a
                  release image via the Cincinnati graph API. When not set, nodes use the control plane's
                  release image.
                maxLength: 64
                minLength: 5
                type: string
                x-kubernetes-validations:
                - message: version must be a valid semantic version (e.g., 4.20.1)
                  rule: self.matches('^(0|[1-9]\\d*)\\.(0|[1-9]\\d*)\\.(0|[1-9]\\d*)$')
            type: object
          status:
            description: status defines the observed state of the OpenshiftEC2NodeClass.
            minProperties: 1
            properties:
              conditions:
