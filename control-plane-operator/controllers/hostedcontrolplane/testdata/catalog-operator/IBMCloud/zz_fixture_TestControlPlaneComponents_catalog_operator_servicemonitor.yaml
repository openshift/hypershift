apiVersion: monitoring.coreos.com/v1
kind: ServiceMonitor
metadata:
  annotations:
    hypershift.openshift.io/metrics-endpoint: https-metrics
    hypershift.openshift.io/metrics-job: catalog-operator-metrics
    hypershift.openshift.io/metrics-namespace: openshift-operator-lifecycle-manager
    hypershift.openshift.io/metrics-service: catalog-operator-metrics
  name: catalog-operator
  namespace: hcp-namespace
  ownerReferences:
  - apiVersion: hypershift.openshift.io/v1beta1
    blockOwnerDeletion: true
    controller: true
    kind: HostedControlPlane
    name: hcp
    uid: ""
  resourceVersion: "1"
spec:
  endpoints:
  - metricRelabelings:
    - action: drop
      regex: etcd_(debugging|disk|server).*
      sourceLabels:
      - __name__
    - action: replace
      replacement: ""
      targetLabel: _id
    relabelings:
    - action: replace
      replacement: ""
      targetLabel: _id
    scheme: https
    targetPort: metrics
    tlsConfig:
      ca:
        configMap:
          key: ca.crt
          name: root-ca
      cert:
        secret:
          key: tls.crt
          name: metrics-client
      keySecret:
        key: tls.key
        name: metrics-client
      serverName: catalog-operator-metrics
  namespaceSelector:
    matchNames:
    - hcp-namespace
  selector:
    matchLabels:
      app: catalog-operator
