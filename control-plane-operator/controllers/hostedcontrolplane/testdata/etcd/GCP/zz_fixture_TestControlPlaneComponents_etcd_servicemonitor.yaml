apiVersion: monitoring.coreos.com/v1
kind: ServiceMonitor
metadata:
  annotations:
    hypershift.openshift.io/metrics-endpoint: etcd-metrics
    hypershift.openshift.io/metrics-job: etcd
    hypershift.openshift.io/metrics-namespace: openshift-etcd
    hypershift.openshift.io/metrics-service: etcd
  name: etcd
  namespace: hcp-namespace
  ownerReferences:
  - apiVersion: hypershift.openshift.io/v1beta1
    blockOwnerDeletion: true
    controller: true
    kind: HostedControlPlane
    name: hcp
    uid: ""
  resourceVersion: "1"
spec:
  endpoints:
  - metricRelabelings:
    - action: replace
      replacement: ""
      targetLabel: _id
    port: metrics
    relabelings:
    - action: replace
      replacement: ""
      targetLabel: _id
    scheme: https
    tlsConfig:
      ca:
        configMap:
          key: ca.crt
          name: etcd-ca
      cert:
        secret:
          key: etcd-client.crt
          name: etcd-metrics-client-tls
      keySecret:
        key: etcd-client.key
        name: etcd-metrics-client-tls
      serverName: etcd-client
  namespaceSelector:
    matchNames:
    - hcp-namespace
  selector:
    matchLabels:
      app: etcd
