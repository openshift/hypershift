apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: etcd-backup-gcs
  namespace: hcp-namespace
  ownerReferences:
  - apiVersion: hypershift.openshift.io/v1beta1
    blockOwnerDeletion: true
    controller: true
    kind: HostedControlPlane
    name: hcp
    uid: ""
  resourceVersion: "1"
rules:
- apiGroups:
  - ""
  resourceNames:
  - root-ca
  - etcd-signer
  - sa-signing-key
  - etcd-client-tls
  resources:
  - secrets
  verbs:
  - get
- apiGroups:
  - ""
  resourceNames:
  - etcd-ca
  resources:
  - configmaps
  verbs:
  - get
