apiVersion: monitoring.coreos.com/v1
kind: ServiceMonitor
metadata:
  annotations:
    hypershift.openshift.io/metrics-endpoint: https
    hypershift.openshift.io/metrics-job: kube-scheduler
    hypershift.openshift.io/metrics-namespace: openshift-kube-scheduler
    hypershift.openshift.io/metrics-service: kube-scheduler
  name: kube-scheduler
  namespace: hcp-namespace
  ownerReferences:
  - apiVersion: hypershift.openshift.io/v1beta1
    blockOwnerDeletion: true
    controller: true
    kind: HostedControlPlane
    name: hcp
    uid: ""
  resourceVersion: "1"
spec:
  endpoints:
  - metricRelabelings:
    - action: replace
      replacement: ""
      targetLabel: _id
    relabelings:
    - action: replace
      replacement: ""
      targetLabel: _id
    scheme: https
    targetPort: client
    tlsConfig:
      ca:
        configMap:
          key: ca.crt
          name: root-ca
      cert:
        secret:
          key: tls.crt
          name: metrics-client
      keySecret:
        key: tls.key
        name: metrics-client
      serverName: kube-scheduler
  - metricRelabelings:
    - action: replace
      replacement: ""
      targetLabel: _id
    path: /metrics/resources
    relabelings:
    - action: replace
      replacement: ""
      targetLabel: _id
    scheme: https
    targetPort: client
    tlsConfig:
      ca:
        configMap:
          key: ca.crt
          name: root-ca
      cert:
        secret:
          key: tls.crt
          name: metrics-client
      keySecret:
        key: tls.key
        name: metrics-client
      serverName: kube-scheduler
  namespaceSelector:
    matchNames:
    - hcp-namespace
  selector:
    matchLabels:
      app: kube-scheduler
