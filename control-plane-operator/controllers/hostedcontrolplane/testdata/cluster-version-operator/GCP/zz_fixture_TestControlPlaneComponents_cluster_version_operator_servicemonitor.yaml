apiVersion: monitoring.coreos.com/v1
kind: ServiceMonitor
metadata:
  annotations:
    hypershift.openshift.io/metrics-endpoint: metrics
    hypershift.openshift.io/metrics-job: cluster-version-operator
    hypershift.openshift.io/metrics-namespace: openshift-cluster-version
    hypershift.openshift.io/metrics-service: cluster-version-operator
  name: cluster-version-operator
  namespace: hcp-namespace
  ownerReferences:
  - apiVersion: hypershift.openshift.io/v1beta1
    blockOwnerDeletion: true
    controller: true
    kind: HostedControlPlane
    name: hcp
    uid: ""
  resourceVersion: "1"
spec:
  endpoints:
  - metricRelabelings:
    - action: drop
      regex: etcd_(debugging|disk|server).*
      sourceLabels:
      - __name__
    - action: replace
      replacement: ""
      targetLabel: _id
    relabelings:
    - action: replace
      replacement: ""
      targetLabel: _id
    scheme: https
    targetPort: https
    tlsConfig:
      ca:
        configMap:
          key: ca.crt
          name: root-ca
      cert: {}
      serverName: cluster-version-operator
  namespaceSelector:
    matchNames:
    - hcp-namespace
  selector:
    matchLabels:
      app: cluster-version-operator
      k8s-app: cluster-version-operator
