apiVersion: v1
kind: Service
metadata:
  name: catalogd
spec:
  ports:
  - name: https
    port: 443
    protocol: TCP
    targetPort: 8443
  - name: webhook
    port: 9443
    protocol: TCP
    targetPort: 9443
  - name: metrics
    port: 7443
    protocol: TCP
    targetPort: 7443
  selector:
    app.kubernetes.io/name: catalogd
  type: ClusterIP
