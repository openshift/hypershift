apiVersion: monitoring.coreos.com/v1
kind: ServiceMonitor
metadata:
  name: kube-controller-manager
  annotations:
    hypershift.openshift.io/metrics-job: kube-controller-manager
    hypershift.openshift.io/metrics-namespace: openshift-kube-controller-manager
    hypershift.openshift.io/metrics-service: kube-controller-manager
    hypershift.openshift.io/metrics-endpoint: https
spec:
  endpoints:
  - metricRelabelings:
    - action: keep
      regex: pv_collector_total_pv_count
      sourceLabels:
      - __name__
    scheme: https
    targetPort: client
    tlsConfig:
      ca:
        configMap:
          key: ca.crt
          name: root-ca
      cert:
        secret:
          key: tls.crt
          name: metrics-client
      keySecret:
        key: tls.key
        name: metrics-client
      serverName: kube-controller-manager
  selector:
    matchLabels:
      app: kube-controller-manager
