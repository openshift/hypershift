apiVersion: monitoring.coreos.com/v1
kind: ServiceMonitor
metadata:
  name: olm-operator
  annotations:
    hypershift.openshift.io/metrics-job: olm-operator-metrics
    hypershift.openshift.io/metrics-namespace: openshift-operator-lifecycle-manager
    hypershift.openshift.io/metrics-service: olm-operator-metrics
    hypershift.openshift.io/metrics-endpoint: https-metrics
spec:
  endpoints:
  - scheme: https
    targetPort: metrics
    tlsConfig:
      ca:
        configMap:
          key: ca.crt
          name: root-ca
      cert:
        secret:
          key: tls.crt
          name: metrics-client
      keySecret:
        key: tls.key
        name: metrics-client
      serverName: olm-operator-metrics
  selector:
    matchLabels:
      app: olm-operator
