apiVersion: monitoring.rhobs/v1
kind: PodMonitor
metadata:
  name: cluster-autoscaler
  namespace: HCP_NAMESPACE
spec:
  namespaceSelector:
    matchNames:
      - HCP_NAMESPACE
  selector:
    matchLabels:
      app: cluster-autoscaler
  podMetricsEndpoints:
  - port: metrics
    path: /metrics
    interval: 30s
    scheme: http