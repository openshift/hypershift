apiVersion: v1
data:
  ccm-config: |
    [global]
    version = 1.1.0
    [kubernetes]
    config-file = /etc/kubernetes/kubeconfig
    [provider]
    cluster-default-provider = g2
    g2Credentials = /etc/vpc/ibmcloud_api_key
    g2workerServiceAccountID = test-account-id
    g2ResourceGroupName = test-resource-group
    g2VpcSubnetNames = test-subnet
    g2VpcName = test-vpc
    accountID = test-account-id
    clusterID = test-cluster
    region = us-south
    powerVSCloudInstanceID = test-service-instance-id
    powerVSRegion = us-south
    powerVSZone = us-south-1
kind: ConfigMap
metadata:
  name: ccm-config
