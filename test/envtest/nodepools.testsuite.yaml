apiVersion: apiextensions.k8s.io/v1
name: "NodePool API validation"
crdName: nodepools.hypershift.openshift.io
version: v1beta1
tests:
  onCreate:
  # --- Taint validation ---
  - name: when key prefix is not a valid sudomain it should fail
    initial: |
      apiVersion: hypershift.openshift.io/v1beta1
      kind: NodePool
      spec:
        arch: amd64
        clusterName: some-cluster
        management:
          autoRepair: false
          upgradeType: Replace
        release:
          image: quay.io/openshift-release-dev/ocp-release:4.17.0-rc.0-x86_64
        replicas: 0
        platform:
          aws:
            instanceProfile: a-profile
            instanceType: m6a.2xlarge
            rootVolume:
              size: 120
              type: gp3
            subnet:
              id: "subnet-any"
          type: AWS
        taints:
        - key: "prefix@/suffix"
          value: "value"
          effect: "NoSchedule"
    expectedError: "key must be a qualified name with an optional subdomain prefix e.g. example.com/MyName"

  - name: when key suffix is not a valid qualified name it should fail
    initial: |
      apiVersion: hypershift.openshift.io/v1beta1
      kind: NodePool
      spec:
        arch: amd64
        clusterName: some-cluster
        management:
          autoRepair: false
          upgradeType: Replace
        release:
          image: quay.io/openshift-release-dev/ocp-release:4.17.0-rc.0-x86_64
        replicas: 0
        platform:
          aws:
            instanceProfile: a-profile
            instanceType: m6a.2xlarge
            rootVolume:
              size: 120
              type: gp3
            subnet:
              id: "subnet-any"
          type: AWS
        taints:
        - key: "prefix/suffix@"
          value: "value"
          effect: "NoSchedule"
    expectedError: "key must be a qualified name with an optional subdomain prefix e.g. example.com/MyName"

  - name: when key is empty it should fail
    initial: |
      apiVersion: hypershift.openshift.io/v1beta1
      kind: NodePool
      spec:
        arch: amd64
        clusterName: some-cluster
        management:
          autoRepair: false
          upgradeType: Replace
        release:
          image: quay.io/openshift-release-dev/ocp-release:4.17.0-rc.0-x86_64
        replicas: 0
        platform:
          aws:
            instanceProfile: a-profile
            instanceType: m6a.2xlarge
            rootVolume:
              size: 120
              type: gp3
            subnet:
              id: "subnet-any"
          type: AWS
        taints:
        - key: ""
          value: "value"
          effect: "NoSchedule"
    expectedError: "spec.taints[0].key in body should be at least 1 chars long"

  - name: when key is a valid qualified name with no prefix it should pass
    initial: |
      apiVersion: hypershift.openshift.io/v1beta1
      kind: NodePool
      spec:
        arch: amd64
        clusterName: some-cluster
        management:
          autoRepair: false
          upgradeType: Replace
        release:
          image: quay.io/openshift-release-dev/ocp-release:4.17.0-rc.0-x86_64
        replicas: 0
        platform:
          aws:
            instanceProfile: a-profile
            instanceType: m6a.2xlarge
            rootVolume:
              size: 120
              type: gp3
            subnet:
              id: "subnet-any"
          type: AWS
        taints:
        - key: "valid-suffix"
          value: ""
          effect: "NoSchedule"

  - name: when key is a valid qualified name with a subdomain prefix it should pass
    initial: |
      apiVersion: hypershift.openshift.io/v1beta1
      kind: NodePool
      spec:
        arch: amd64
        clusterName: some-cluster
        management:
          autoRepair: false
          upgradeType: Replace
        release:
          image: quay.io/openshift-release-dev/ocp-release:4.17.0-rc.0-x86_64
        replicas: 0
        platform:
          aws:
            instanceProfile: a-profile
            instanceType: m6a.2xlarge
            rootVolume:
              size: 120
              type: gp3
            subnet:
              id: "subnet-any"
          type: AWS
        taints:
        - key: "valid-prefix.com/valid-suffix"
          value: ""
          effect: "NoSchedule"

  - name: when key is a valid qualified name with a subdomain prefix and value is a valid qualified name it should pass
    initial: |
      apiVersion: hypershift.openshift.io/v1beta1
      kind: NodePool
      spec:
        arch: amd64
        clusterName: some-cluster
        management:
          autoRepair: false
          upgradeType: Replace
        release:
          image: quay.io/openshift-release-dev/ocp-release:4.17.0-rc.0-x86_64
        replicas: 0
        platform:
          aws:
            instanceProfile: a-profile
            instanceType: m6a.2xlarge
            rootVolume:
              size: 120
              type: gp3
            subnet:
              id: "subnet-any"
          type: AWS
        taints:
        - key: "valid-prefix.com/valid-suffix"
          value: "value"
          effect: "NoSchedule"

  - name: when value contains strange chars it should fail
    initial: |
      apiVersion: hypershift.openshift.io/v1beta1
      kind: NodePool
      spec:
        arch: amd64
        clusterName: some-cluster
        management:
          autoRepair: false
          upgradeType: Replace
        release:
          image: quay.io/openshift-release-dev/ocp-release:4.17.0-rc.0-x86_64
        replicas: 0
        platform:
          aws:
            instanceProfile: a-profile
            instanceType: m6a.2xlarge
            rootVolume:
              size: 120
              type: gp3
            subnet:
              id: "subnet-any"
          type: AWS
        taints:
        - key: "valid-prefix.com/valid-suffix"
          value: "@"
          effect: "NoSchedule"
    expectedError: "Value must start and end with alphanumeric characters and can only contain '-', '_', '.' in the middle"

  # --- PausedUntil validation ---
  - name: when pausedUntil is a random string it should fail
    initial: |
      apiVersion: hypershift.openshift.io/v1beta1
      kind: NodePool
      spec:
        arch: amd64
        clusterName: some-cluster
        management:
          autoRepair: false
          upgradeType: Replace
        release:
          image: quay.io/openshift-release-dev/ocp-release:4.17.0-rc.0-x86_64
        replicas: 0
        platform:
          aws:
            instanceProfile: a-profile
            instanceType: m6a.2xlarge
            rootVolume:
              size: 120
              type: gp3
            subnet:
              id: "subnet-any"
          type: AWS
        pausedUntil: "fail"
    expectedError: "PausedUntil must be a date in RFC3339 format or 'True', 'true', 'False' or 'false'"

  - name: when pausedUntil date is not RFC3339 format it should fail
    initial: |
      apiVersion: hypershift.openshift.io/v1beta1
      kind: NodePool
      spec:
        arch: amd64
        clusterName: some-cluster
        management:
          autoRepair: false
          upgradeType: Replace
        release:
          image: quay.io/openshift-release-dev/ocp-release:4.17.0-rc.0-x86_64
        replicas: 0
        platform:
          aws:
            instanceProfile: a-profile
            instanceType: m6a.2xlarge
            rootVolume:
              size: 120
              type: gp3
            subnet:
              id: "subnet-any"
          type: AWS
        pausedUntil: "2022-01-01"
    expectedError: "PausedUntil must be a date in RFC3339 format or 'True', 'true', 'False' or 'false'"

  - name: when pausedUntil is an allowed bool False it should pass
    initial: |
      apiVersion: hypershift.openshift.io/v1beta1
      kind: NodePool
      spec:
        arch: amd64
        clusterName: some-cluster
        management:
          autoRepair: false
          upgradeType: Replace
        release:
          image: quay.io/openshift-release-dev/ocp-release:4.17.0-rc.0-x86_64
        replicas: 0
        platform:
          aws:
            instanceProfile: a-profile
            instanceType: m6a.2xlarge
            rootVolume:
              size: 120
              type: gp3
            subnet:
              id: "subnet-any"
          type: AWS
        pausedUntil: "False"

  - name: when pausedUntil is an allowed bool false it should pass
    initial: |
      apiVersion: hypershift.openshift.io/v1beta1
      kind: NodePool
      spec:
        arch: amd64
        clusterName: some-cluster
        management:
          autoRepair: false
          upgradeType: Replace
        release:
          image: quay.io/openshift-release-dev/ocp-release:4.17.0-rc.0-x86_64
        replicas: 0
        platform:
          aws:
            instanceProfile: a-profile
            instanceType: m6a.2xlarge
            rootVolume:
              size: 120
              type: gp3
            subnet:
              id: "subnet-any"
          type: AWS
        pausedUntil: "false"

  - name: when pausedUntil is an allowed bool true it should pass
    initial: |
      apiVersion: hypershift.openshift.io/v1beta1
      kind: NodePool
      spec:
        arch: amd64
        clusterName: some-cluster
        management:
          autoRepair: false
          upgradeType: Replace
        release:
          image: quay.io/openshift-release-dev/ocp-release:4.17.0-rc.0-x86_64
        replicas: 0
        platform:
          aws:
            instanceProfile: a-profile
            instanceType: m6a.2xlarge
            rootVolume:
              size: 120
              type: gp3
            subnet:
              id: "subnet-any"
          type: AWS
        pausedUntil: "true"

  - name: when pausedUntil is an allowed bool True it should pass
    initial: |
      apiVersion: hypershift.openshift.io/v1beta1
      kind: NodePool
      spec:
        arch: amd64
        clusterName: some-cluster
        management:
          autoRepair: false
          upgradeType: Replace
        release:
          image: quay.io/openshift-release-dev/ocp-release:4.17.0-rc.0-x86_64
        replicas: 0
        platform:
          aws:
            instanceProfile: a-profile
            instanceType: m6a.2xlarge
            rootVolume:
              size: 120
              type: gp3
            subnet:
              id: "subnet-any"
          type: AWS
        pausedUntil: "True"

  - name: when pausedUntil date is RFC3339 it should pass
    initial: |
      apiVersion: hypershift.openshift.io/v1beta1
      kind: NodePool
      spec:
        arch: amd64
        clusterName: some-cluster
        management:
          autoRepair: false
          upgradeType: Replace
        release:
          image: quay.io/openshift-release-dev/ocp-release:4.17.0-rc.0-x86_64
        replicas: 0
        platform:
          aws:
            instanceProfile: a-profile
            instanceType: m6a.2xlarge
            rootVolume:
              size: 120
              type: gp3
            subnet:
              id: "subnet-any"
          type: AWS
        pausedUntil: "2022-01-01T00:00:00Z"

  # --- Release image validation ---
  - name: when image is bad format it should fail
    initial: |
      apiVersion: hypershift.openshift.io/v1beta1
      kind: NodePool
      spec:
        arch: amd64
        clusterName: some-cluster
        management:
          autoRepair: false
          upgradeType: Replace
        release:
          image: "@"
        replicas: 0
        platform:
          aws:
            instanceProfile: a-profile
            instanceType: m6a.2xlarge
            rootVolume:
              size: 120
              type: gp3
            subnet:
              id: "subnet-any"
          type: AWS
    expectedError: "Image must start with a word character (letters, digits, or underscores) and contain no white spaces"

  - name: when image is empty it should fail
    initial: |
      apiVersion: hypershift.openshift.io/v1beta1
      kind: NodePool
      spec:
        arch: amd64
        clusterName: some-cluster
        management:
          autoRepair: false
          upgradeType: Replace
        release:
          image: "@"
        replicas: 0
        platform:
          aws:
            instanceProfile: a-profile
            instanceType: m6a.2xlarge
            rootVolume:
              size: 120
              type: gp3
            subnet:
              id: "subnet-any"
          type: AWS
    expectedError: "Image must start with a word character (letters, digits, or underscores) and contain no white spaces"

  - name: when image is valid it should pass
    initial: |
      apiVersion: hypershift.openshift.io/v1beta1
      kind: NodePool
      spec:
        arch: amd64
        clusterName: some-cluster
        management:
          autoRepair: false
          upgradeType: Replace
        release:
          image: quay.io/openshift-release-dev/ocp-release:4.17.0-rc.0-x86_64
        replicas: 0
        platform:
          aws:
            instanceProfile: a-profile
            instanceType: m6a.2xlarge
            rootVolume:
              size: 120
              type: gp3
            subnet:
              id: "subnet-any"
          type: AWS

  # --- Management validation ---
  - name: when replace upgrade type is set with inPlace configuration it should fail
    initial: |
      apiVersion: hypershift.openshift.io/v1beta1
      kind: NodePool
      spec:
        arch: amd64
        clusterName: some-cluster
        management:
          upgradeType: Replace
          inPlace:
            maxUnavailable: 1
        release:
          image: quay.io/openshift-release-dev/ocp-release:4.17.0-rc.0-x86_64
        replicas: 0
        platform:
          aws:
            instanceProfile: a-profile
            instanceType: m6a.2xlarge
            rootVolume:
              size: 120
              type: gp3
            subnet:
              id: "subnet-any"
          type: AWS
    expectedError: "The 'inPlace' field can only be set when 'upgradeType' is 'InPlace'"

  - name: when strategy is onDelete with RollingUpdate configuration it should fail
    initial: |
      apiVersion: hypershift.openshift.io/v1beta1
      kind: NodePool
      spec:
        arch: amd64
        clusterName: some-cluster
        management:
          upgradeType: Replace
          replace:
            strategy: OnDelete
            rollingUpdate:
              maxUnavailable: 1
        release:
          image: quay.io/openshift-release-dev/ocp-release:4.17.0-rc.0-x86_64
        replicas: 0
        platform:
          aws:
            instanceProfile: a-profile
            instanceType: m6a.2xlarge
            rootVolume:
              size: 120
              type: gp3
            subnet:
              id: "subnet-any"
          type: AWS
    expectedError: "The 'rollingUpdate' field can only be set when 'strategy' is 'RollingUpdate'"

  # --- AWS Placement / Capacity Reservation validation ---
  - name: when tenancy is host and capacity reservation is specified it should fail
    initial: |
      apiVersion: hypershift.openshift.io/v1beta1
      kind: NodePool
      spec:
        arch: amd64
        clusterName: some-cluster
        management:
          autoRepair: false
          upgradeType: Replace
        release:
          image: quay.io/openshift-release-dev/ocp-release:4.17.0-rc.0-x86_64
        replicas: 0
        platform:
          aws:
            instanceProfile: a-profile
            instanceType: m6a.2xlarge
            rootVolume:
              size: 120
              type: gp3
            subnet:
              id: "subnet-any"
            placement:
              tenancy: host
              capacityReservation:
                id: "cr-1234567890abcdef0"
          type: AWS
    expectedError: "AWS Capacity Reservations cannot be used with Dedicated Hosts (tenancy 'host')"

  - name: when capacity reservation ID is specified with preference None it should fail
    initial: |
      apiVersion: hypershift.openshift.io/v1beta1
      kind: NodePool
      spec:
        arch: amd64
        clusterName: some-cluster
        management:
          autoRepair: false
          upgradeType: Replace
        release:
          image: quay.io/openshift-release-dev/ocp-release:4.17.0-rc.0-x86_64
        replicas: 0
        platform:
          aws:
            instanceProfile: a-profile
            instanceType: m6a.2xlarge
            rootVolume:
              size: 120
              type: gp3
            subnet:
              id: "subnet-any"
            placement:
              capacityReservation:
                id: "cr-1234567890abcdef0"
                preference: None
          type: AWS
    expectedError: "AWS Capacity Reservation preference 'None' or 'Open' is incompatible with specifying a Capacity Reservation ID"

  - name: when capacity reservation ID has invalid format it should fail
    initial: |
      apiVersion: hypershift.openshift.io/v1beta1
      kind: NodePool
      spec:
        arch: amd64
        clusterName: some-cluster
        management:
          autoRepair: false
          upgradeType: Replace
        release:
          image: quay.io/openshift-release-dev/ocp-release:4.17.0-rc.0-x86_64
        replicas: 0
        platform:
          aws:
            instanceProfile: a-profile
            instanceType: m6a.2xlarge
            rootVolume:
              size: 120
              type: gp3
            subnet:
              id: "subnet-any"
            placement:
              capacityReservation:
                id: "invalid-id"
          type: AWS
    expectedError: "AWS Capacity Reservation ID must start with 'cr-' followed by 17 lowercase hexadecimal characters"

  - name: when capacity reservation ID is specified with preference Open it should fail
    initial: |
      apiVersion: hypershift.openshift.io/v1beta1
      kind: NodePool
      spec:
        arch: amd64
        clusterName: some-cluster
        management:
          autoRepair: false
          upgradeType: Replace
        release:
          image: quay.io/openshift-release-dev/ocp-release:4.17.0-rc.0-x86_64
        replicas: 0
        platform:
          aws:
            instanceProfile: a-profile
            instanceType: m6a.2xlarge
            rootVolume:
              size: 120
              type: gp3
            subnet:
              id: "subnet-any"
            placement:
              capacityReservation:
                id: "cr-1234567890abcdef0"
                preference: Open
          type: AWS
    expectedError: "AWS Capacity Reservation preference 'None' or 'Open' is incompatible with specifying a Capacity Reservation ID"

  - name: when marketType is CapacityBlocks without capacity reservation ID it should fail
    initial: |
      apiVersion: hypershift.openshift.io/v1beta1
      kind: NodePool
      spec:
        arch: amd64
        clusterName: some-cluster
        management:
          autoRepair: false
          upgradeType: Replace
        release:
          image: quay.io/openshift-release-dev/ocp-release:4.17.0-rc.0-x86_64
        replicas: 0
        platform:
          aws:
            instanceProfile: a-profile
            instanceType: m6a.2xlarge
            rootVolume:
              size: 120
              type: gp3
            subnet:
              id: "subnet-any"
            placement:
              capacityReservation:
                marketType: CapacityBlocks
                preference: Open
          type: AWS
    expectedError: "AWS Capacity Reservation market type 'CapacityBlocks' requires a Capacity Reservation ID"

  - name: when tenancy is default with capacity reservation it should pass
    initial: |
      apiVersion: hypershift.openshift.io/v1beta1
      kind: NodePool
      spec:
        arch: amd64
        clusterName: some-cluster
        management:
          autoRepair: false
          upgradeType: Replace
        release:
          image: quay.io/openshift-release-dev/ocp-release:4.17.0-rc.0-x86_64
        replicas: 0
        platform:
          aws:
            instanceProfile: a-profile
            instanceType: m6a.2xlarge
            rootVolume:
              size: 120
              type: gp3
            subnet:
              id: "subnet-any"
            placement:
              tenancy: default
              capacityReservation:
                id: "cr-1234567890abcdef0"
          type: AWS

  - name: when capacity reservation has preference Open without ID it should pass
    initial: |
      apiVersion: hypershift.openshift.io/v1beta1
      kind: NodePool
      spec:
        arch: amd64
        clusterName: some-cluster
        management:
          autoRepair: false
          upgradeType: Replace
        release:
          image: quay.io/openshift-release-dev/ocp-release:4.17.0-rc.0-x86_64
        replicas: 0
        platform:
          aws:
            instanceProfile: a-profile
            instanceType: m6a.2xlarge
            rootVolume:
              size: 120
              type: gp3
            subnet:
              id: "subnet-any"
            placement:
              capacityReservation:
                preference: Open
                marketType: OnDemand
          type: AWS

  - name: when capacity reservation ID is specified with preference CapacityReservationsOnly it should pass
    initial: |
      apiVersion: hypershift.openshift.io/v1beta1
      kind: NodePool
      spec:
        arch: amd64
        clusterName: some-cluster
        management:
          autoRepair: false
          upgradeType: Replace
        release:
          image: quay.io/openshift-release-dev/ocp-release:4.17.0-rc.0-x86_64
        replicas: 0
        platform:
          aws:
            instanceProfile: a-profile
            instanceType: m6a.2xlarge
            rootVolume:
              size: 120
              type: gp3
            subnet:
              id: "subnet-any"
            placement:
              capacityReservation:
                id: "cr-1234567890abcdef0"
                preference: CapacityReservationsOnly
                marketType: CapacityBlocks
          type: AWS

  - name: When spot market type is set without spot options it should pass
    initial: |
      apiVersion: hypershift.openshift.io/v1beta1
      kind: NodePool
      spec:
        arch: amd64
        clusterName: some-cluster
        management:
          autoRepair: false
          upgradeType: Replace
        release:
          image: quay.io/openshift-release-dev/ocp-release:4.17.0-rc.0-x86_64
        replicas: 0
        platform:
          aws:
            instanceProfile: a-profile
            instanceType: m6a.2xlarge
