      apiVersion: hypershift.openshift.io/v1beta1
      kind: NodePool
      spec:
        arch: amd64
        clusterName: some-cluster
        management:
          autoRepair: false
          upgradeType: Replace
        release:
          image: quay.io/openshift-release-dev/ocp-release:4.17.0-rc.0-x86_64
        replicas: 0
        platform:
          aws:
            instanceProfile: a-profile
            instanceType: m6a.2xlarge
            rootVolume:
              size: 120
              type: gp3
            subnet:
              id: "subnet-any"
            placement:
              marketType: Spot
              tenancy: dedicated
              spot:
                maxPrice: "0.50"
          type: AWS
    expectedError: "Spot instances require default tenancy or unset"

  - name: When spot market type is set with host tenancy it should fail
    initial: |
      apiVersion: hypershift.openshift.io/v1beta1
