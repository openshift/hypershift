apiVersion: apiextensions.k8s.io/v1
name: "HostedCluster API validation"
crdName: hostedclusters.hypershift.openshift.io
version: v1beta1
tests:
  onCreate:
  # --- Valid creation ---
  - name: When a valid HostedCluster is created it should pass
    initial: &base |
      apiVersion: hypershift.openshift.io/v1beta1
      kind: HostedCluster
      spec:
        etcd:
          managementType: "Managed"
          managed:
            storage:
              type: "PersistentVolume"
              persistentVolume:
                size: "8Gi"
        dns:
          baseDomain: example.hypershift.devcluster.openshift.com
        serviceAccountSigningKey:
          name: service-account-signing-key
        platform:
          type: AWS
        pullSecret:
          name: secret
        release:
          image: quay.io/openshift-release-dev/ocp-release:4.15.11-x86_64
        secretEncryption:
          aescbc:
            activeKey:
              name: key-management-etcd-encryption-key
          type: aescbc
        services:
        - service: APIServer
          servicePublishingStrategy:
            type: Route
            route:
              hostname: api.example.com
        - service: OAuthServer
          servicePublishingStrategy:
            type: Route
            route:
              hostname: oauth.example.com
        - service: Konnectivity
          servicePublishingStrategy:
            type: Route
            route:
              hostname: konnectivity.example.com
        - service: Ignition
          servicePublishingStrategy:
            type: Route
            route: {}

  # --- Capabilities validation ---
  - name: When capabilities.disabled is set to a supported capability it should pass
    initial: |
      apiVersion: hypershift.openshift.io/v1beta1
      kind: HostedCluster
      spec:
