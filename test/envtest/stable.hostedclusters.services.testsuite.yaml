apiVersion: apiextensions.k8s.io/v1
name: "HostedCluster services validation"
crdName: hostedclusters.hypershift.openshift.io
version: v1beta1
tests:
  onCreate:
  # --- Services validation ---
  - name: When less than 4 services are set it should fail
    initial: |
      apiVersion: hypershift.openshift.io/v1beta1
      kind: HostedCluster
      spec:
        dns:
          baseDomain: example.com
        platform:
          type: AWS
        pullSecret:
          name: secret
        release:
          image: quay.io/openshift-release-dev/ocp-release:4.15.11-x86_64
        secretEncryption:
          aescbc:
            activeKey:
              name: key
          type: aescbc
        services:
        - service: Ignition
          servicePublishingStrategy:
            type: Route
            route: {}
        - service: Konnectivity
          servicePublishingStrategy:
            type: Route
            route: {}
        - service: OAuthServer
          servicePublishingStrategy:
            type: Route
            route: {}
    expectedError: "spec.services in body should have at least 4 items or 3 for IBMCloud"

  - name: When servicePublishingStrategy is nodePort and addresses are valid hostname IPv4 and IPv6 it should pass
    initial: |
      apiVersion: hypershift.openshift.io/v1beta1
      kind: HostedCluster
      spec:
        dns:
          baseDomain: example.com
        platform:
          type: AWS
        pullSecret:
          name: secret
        release:
          image: quay.io/openshift-release-dev/ocp-release:4.15.11-x86_64
        secretEncryption:
          aescbc:
            activeKey:
              name: key
          type: aescbc
        services:
        - service: APIServer
          servicePublishingStrategy:
            type: NodePort
            nodePort:
              address: "kas.example.com"
        - service: Ignition
          servicePublishingStrategy:
            type: NodePort
            nodePort:
              address: "127.0.0.1"
        - service: Konnectivity
          servicePublishingStrategy:
            type: NodePort
            nodePort:
              address: "fd2e:6f44:5dd8:c956::14"
        - service: OAuthServer
          servicePublishingStrategy:
            type: NodePort
            nodePort:
              address: "fd2e:6f44:5dd8:c956:0000:0000:0000:0014"

  - name: When servicePublishingStrategy is nodePort and address is invalid it should fail
    initial: |
      apiVersion: hypershift.openshift.io/v1beta1
      kind: HostedCluster
      spec:
        dns:
          baseDomain: example.com
        platform:
          type: AWS
        pullSecret:
          name: secret
        release:
          image: quay.io/openshift-release-dev/ocp-release:4.15.11-x86_64
        secretEncryption:
          aescbc:
            activeKey:
              name: key
          type: aescbc
        services:
        - service: APIServer
          servicePublishingStrategy:
            type: NodePort
            nodePort:
              address: "@foo"
        - service: Ignition
          servicePublishingStrategy:
            type: NodePort
            nodePort:
              address: "127.0.0.1"
        - service: Konnectivity
          servicePublishingStrategy:
            type: NodePort
            nodePort:
              address: "fd2e:6f44:5dd8:c956::14"
        - service: OAuthServer
          servicePublishingStrategy:
            type: NodePort
            nodePort:
              address: "fd2e:6f44:5dd8:c956:0000:0000:0000:0014"
    expectedError: "address must be a valid hostname, IPv4, or IPv6 address"

  - name: When a type Route is set with the nodePort configuration it should fail
    initial: |
      apiVersion: hypershift.openshift.io/v1beta1
      kind: HostedCluster
      spec:
        dns:
          baseDomain: example.com
        platform:
          type: AWS
        pullSecret:
          name: secret
        release:
          image: quay.io/openshift-release-dev/ocp-release:4.15.11-x86_64
        secretEncryption:
          aescbc:
            activeKey:
              name: key
          type: aescbc
        services:
        - service: APIServer
          servicePublishingStrategy:
            type: Route
            route:
              hostname: api.example.com
        - service: Ignition
          servicePublishingStrategy:
            type: Route
            nodePort:
              address: ignition.example.com
              port: 3030
        - service: Konnectivity
          servicePublishingStrategy:
            type: Route
            route: {}
        - service: OAuthServer
          servicePublishingStrategy:
            type: Route
            route: {}
    expectedError: "nodePort is required when type is NodePort, and forbidden otherwise"

  - name: When a type NodePort is set with the route configuration it should fail
    initial: |
      apiVersion: hypershift.openshift.io/v1beta1
      kind: HostedCluster
      spec:
        dns:
          baseDomain: example.com
        platform:
          type: AWS
        pullSecret:
          name: secret
        release:
          image: quay.io/openshift-release-dev/ocp-release:4.15.11-x86_64
        secretEncryption:
          aescbc:
            activeKey:
              name: key
          type: aescbc
        services:
        - service: APIServer
          servicePublishingStrategy:
            type: Route
            route:
              hostname: api.example.com
        - service: Ignition
          servicePublishingStrategy:
            type: NodePort
            route:
              hostname: ignition.example.com
        - service: Konnectivity
          servicePublishingStrategy:
            type: Route
            route: {}
        - service: OAuthServer
          servicePublishingStrategy:
            type: Route
            route: {}
    expectedError: "only route is allowed when type is Route, and forbidden otherwise"

  # --- loadBalancer hostname clash with namedCertificates ---
  - name: When loadBalancer hostname clashes with namedCertificates it should fail
    initial: |
      apiVersion: hypershift.openshift.io/v1beta1
      kind: HostedCluster
      spec:
        dns:
          baseDomain: example.com
        platform:
          type: AWS
        pullSecret:
          name: secret
        release:
          image: quay.io/openshift-release-dev/ocp-release:4.15.11-x86_64
        secretEncryption:
          aescbc:
            activeKey:
              name: key
          type: aescbc
        services:
        - service: APIServer
          servicePublishingStrategy:
            type: LoadBalancer
            loadBalancer:
              hostname: kas.duplicated.hostname.com
        - service: Ignition
          servicePublishingStrategy:
            type: NodePort
            nodePort:
              address: "127.0.0.1"
        - service: Konnectivity
          servicePublishingStrategy:
            type: NodePort
            nodePort:
              address: "fd2e:6f44:5dd8:c956::14"
        - service: OAuthServer
          servicePublishingStrategy:
            type: NodePort
            nodePort:
              address: "fd2e:6f44:5dd8:c956:0000:0000:0000:0014"
        configuration:
          apiServer:
            servingCerts:
              namedCertificates:
              - names:
                - anything
                - kas.duplicated.hostname.com
    expectedError: "loadBalancer hostname cannot be in ClusterConfiguration.apiserver.servingCerts.namedCertificates"
