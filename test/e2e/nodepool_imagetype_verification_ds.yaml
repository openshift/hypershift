apiVersion: apps/v1
kind: DaemonSet
metadata:
  name: imagetype-verification-checker
  namespace: kube-system
spec:
  selector:
    matchLabels:
      name: imagetype-verification-checker
  template:
    metadata:
      labels:
        name: imagetype-verification-checker
    spec:
      tolerations:
      - operator: Exists
      containers:
      - name: imagetype-verification-checker
        image: alpine
        command:
        - /bin/sleep
        - 24h
        resources:
          requests:
            cpu: 100m
            memory: 200Mi
        readinessProbe:
          exec:
            command:
            - /bin/sh
            - -c
            - |
              # Verify that the node is running and basic system information is accessible
              # This checks that the AMI selection (Linux/RHCOS vs Windows) is working properly
              # by ensuring the node can run basic Linux commands
              uname -a && cat /host/etc/os-release | grep -E "(ID=|VERSION=)" && echo "ImageType verification successful"
        volumeMounts:
        - name: host
          mountPath: /host
          readOnly: true
      terminationGracePeriodSeconds: 30
      volumes:
      - name: host
        hostPath:
          path: /