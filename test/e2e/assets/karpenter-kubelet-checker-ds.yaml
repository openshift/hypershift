apiVersion: apps/v1
kind: DaemonSet
metadata:
  name: karpenter-kubelet-checker
  namespace: kube-system
spec:
  selector:
    matchLabels:
      name: karpenter-kubelet-checker
  template:
    metadata:
      labels:
        name: karpenter-kubelet-checker
    spec:
      tolerations:
      - operator: Exists
      containers:
      - name: karpenter-kubelet-checker
        image: alpine
        command:
        - /bin/sleep
        - 24h
        resources:
          requests:
            cpu: 100m
            memory: 200Mi
        securityContext:
          privileged: true
        readinessProbe:
          exec:
            command:
            - /bin/sh
            - -c
            - "grep 'maxPods: 427' /host/etc/kubernetes/kubelet.conf"
        volumeMounts:
        - name: host
          mountPath: /host
          readOnly: true
      terminationGracePeriodSeconds: 30
      volumes:
      - name: host
        hostPath:
          path: /
