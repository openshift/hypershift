apiVersion: apps/v1
kind: Deployment
metadata:
  name: arm-app
  namespace: default
spec:
  replicas: 1
  selector:
    matchLabels:
      app: arm-app
  template:
    metadata:
      labels:
        app: arm-app
    spec:
      affinity:
        podAntiAffinity:
          requiredDuringSchedulingIgnoredDuringExecution:
            - labelSelector:
                matchLabels:
                  app: arm-app
              topologyKey: "kubernetes.io/hostname"    
      securityContext:
        runAsUser: 1000
        runAsGroup: 3000
        fsGroup: 2000
      containers:
      - image: quay.io/openshift/origin-pod:4.22.0
        name: arm-app
        resources:
          requests:
            cpu: "250m"
            memory: 256M
        securityContext:
          allowPrivilegeEscalation: false
      nodeSelector:
        karpenter.sh/nodepool: "arm-nodepool"
