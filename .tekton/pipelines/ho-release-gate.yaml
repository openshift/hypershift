apiVersion: tekton.dev/v1
kind: Pipeline
metadata:
  name: ho-release-gate
spec:
  params:
  - name: snapshot-name
    type: string
    description: Name of the Konflux Snapshot to validate
  - name: ho-image
    type: string
    description: HyperShift Operator container image reference from the Snapshot
  - name: e2e-job-names
    type: string
    description: JSON array of Prow periodic job names to run in parallel
    default: '[]'

  tasks:
  - name: extract-image
    taskSpec:
      params:
      - name: snapshot-name
        type: string
      - name: ho-image
        type: string
      results:
      - name: ho-image
        description: Validated HO image reference
      - name: snapshot-name
        description: Snapshot name (passed through)
      steps:
      - name: validate
        image: registry.redhat.io/openshift4/ose-cli:latest
        env:
        - name: HOME
          value: /tekton/home
        script: |
          #!/bin/bash
          set -euo pipefail

          echo "=== extract-image ==="
          echo "Snapshot:  $(params.snapshot-name)"
          echo "HO image:  $(params.ho-image)"

          if [[ -z "$(params.ho-image)" ]]; then
            echo "ERROR: ho-image parameter is empty"
            exit 1
          fi

          DIGEST=$(echo "$(params.ho-image)" | grep -oP 'sha256:[a-f0-9]+' || echo "N/A")
          echo "Digest:    ${DIGEST}"

          COMMIT=$(oc get snapshot "$(params.snapshot-name)" -o jsonpath='{.spec.components[?(@.name=="hypershift-operator-main")].source.git.revision}' 2>/dev/null || echo "N/A")
          echo "Commit:    ${COMMIT}"

          echo "=== validation passed ==="

          echo -n "$(params.ho-image)" > $(results.ho-image.path)
          echo -n "$(params.snapshot-name)" > $(results.snapshot-name.path)
    params:
    - name: snapshot-name
      value: $(params.snapshot-name)
    - name: ho-image
      value: $(params.ho-image)

  - name: run-e2e
    runAfter: [extract-image]
    timeout: "5h30m0s"
    taskSpec:
      params:
      - name: ho-image
        type: string
      - name: e2e-job-names
        type: string
      results:
      - name: results-json
        description: "JSON array of per-job results: [{job, result, url}, ...]"
      steps:
      - name: trigger-and-poll
        image: quay.io/konflux-ci/appstudio-utils:latest
        env:
        - name: GANGWAY_TOKEN
          valueFrom:
            secretKeyRef:
              name: gangway-token
              key: token
        script: |
          #!/bin/bash
          set -euo pipefail

          GANGWAY_URL="https://gangway-ci.apps.ci.l2s4.p1.openshiftapps.com/v1/executions"
          HO_IMAGE="$(params.ho-image)"
          JOB_NAMES_JSON='$(params.e2e-job-names)'
          POLL_INTERVAL=600
          TIMEOUT=14400
          TRIGGER_DELAY=60
          RATE_LIMIT_BACKOFF=120
          MAX_RETRIES=3

          echo "=== run-e2e: setup ==="
          echo "HO image:  ${HO_IMAGE}"
          echo "Jobs:      ${JOB_NAMES_JSON}"
          echo "Poll interval: ${POLL_INTERVAL}s | Timeout: ${TIMEOUT}s"
          echo "Trigger delay: ${TRIGGER_DELAY}s | Rate limit backoff: ${RATE_LIMIT_BACKOFF}s"

          NUM_JOBS=$(echo "${JOB_NAMES_JSON}" | jq -r 'length')
          if [[ "${NUM_JOBS}" -eq 0 ]]; then
            echo "ERROR: e2e-job-names is empty — at least one job is required"
            exit 1
          fi
          echo "Total jobs: ${NUM_JOBS}"
          echo ""

          declare -A JOB_IDS
          declare -A JOB_URLS
          declare -A JOB_RESULTS

          echo "=== run-e2e: triggering ${NUM_JOBS} jobs ==="
          for i in $(seq 0 $((NUM_JOBS - 1))); do
            JOB_NAME=$(echo "${JOB_NAMES_JSON}" | jq -r ".[$i]")
            SHORT_NAME=$(echo "${JOB_NAME}" | sed 's/periodic-ci-openshift-hypershift-release-5.0-periodics-//')
            echo ""
            echo "--- Triggering [${SHORT_NAME}] ---"
            echo "  Full name: ${JOB_NAME}"

            TRIGGERED=false
            for retry in $(seq 1 ${MAX_RETRIES}); do
              RESPONSE=$(curl -s -w '\n%{http_code}' -X POST \
                -H "Authorization: Bearer ${GANGWAY_TOKEN}" \
                -H "Content-Type: application/json" \
                -d "{
                  \"job_name\": \"${JOB_NAME}\",
                  \"job_execution_type\": \"1\",
                  \"pod_spec_options\": {
                    \"envs\": {
                      \"OVERRIDE_IMAGE_HYPERSHIFT_OPERATOR\": \"${HO_IMAGE}\",
                      \"OVERRIDE_IMAGE_HYPERSHIFT_TESTS\": \"registry.ci.openshift.org/hypershift/hypershift-tests:latest\"
                    }
                  }
                }" \
                "${GANGWAY_URL}")

              HTTP_CODE=$(echo "${RESPONSE}" | tail -1)
              BODY=$(echo "${RESPONSE}" | sed '$d')

              if [[ "${HTTP_CODE}" == "200" ]]; then
                TRIGGERED=true
                break
              elif [[ "${HTTP_CODE}" == "429" || "${HTTP_CODE}" -ge 500 ]]; then
                echo "  WARN: HTTP ${HTTP_CODE} (attempt ${retry}/${MAX_RETRIES}) — retrying in ${RATE_LIMIT_BACKOFF}s"
                sleep ${RATE_LIMIT_BACKOFF}
              else
                echo "  ERROR: Trigger failed — HTTP ${HTTP_CODE}"
                echo "  Raw response: ${BODY}"
                break
              fi
            done

            if [[ "${TRIGGERED}" != "true" ]]; then
              echo "  ERROR: Trigger failed after ${MAX_RETRIES} attempts"
              JOB_RESULTS["${JOB_NAME}"]="error"
              JOB_URLS["${JOB_NAME}"]=""
              continue
            fi

            if ! echo "${BODY}" | jq empty 2>/dev/null; then
              echo "  ERROR: Response is not valid JSON"
              echo "  Raw response: ${BODY}"
              JOB_RESULTS["${JOB_NAME}"]="error"
              JOB_URLS["${JOB_NAME}"]=""
              continue
            fi

            JOB_ID=$(echo "${BODY}" | jq -r '.id')
            if [[ -z "${JOB_ID}" || "${JOB_ID}" == "null" ]]; then
              echo "  ERROR: Failed to parse job ID"
              echo "  Raw response: ${BODY}"
              JOB_RESULTS["${JOB_NAME}"]="error"
              JOB_URLS["${JOB_NAME}"]=""
              continue
            fi

            echo "  Job ID: ${JOB_ID}"
            JOB_IDS["${JOB_NAME}"]="${JOB_ID}"
            JOB_RESULTS["${JOB_NAME}"]="pending"
            JOB_URLS["${JOB_NAME}"]=""

            if [[ $i -lt $((NUM_JOBS - 1)) ]]; then
              sleep ${TRIGGER_DELAY}
            fi
          done

          echo ""
          echo "=== run-e2e: resolving Prow URLs ==="
          for JOB_NAME in "${!JOB_IDS[@]}"; do
            JOB_ID="${JOB_IDS[$JOB_NAME]}"
            SHORT_NAME=$(echo "${JOB_NAME}" | sed 's/periodic-ci-openshift-hypershift-release-5.0-periodics-//')
            for attempt in $(seq 1 10); do
              POLL_RESPONSE=$(curl -s -w '\n%{http_code}' -H "Authorization: Bearer ${GANGWAY_TOKEN}" "${GANGWAY_URL}/${JOB_ID}")
              POLL_CODE=$(echo "${POLL_RESPONSE}" | tail -1)
              POLL_BODY=$(echo "${POLL_RESPONSE}" | sed '$d')
              if [[ "${POLL_CODE}" == "200" ]]; then
                URL=$(echo "${POLL_BODY}" | jq -r '.job_url // empty')
                if [[ -n "${URL}" ]]; then
                  JOB_URLS["${JOB_NAME}"]="${URL}"
                  echo "  [${SHORT_NAME}] ${URL}"
                  break
                fi
              fi
              sleep 15
            done
            if [[ -z "${JOB_URLS[$JOB_NAME]}" ]]; then
              echo "  [${SHORT_NAME}] WARN: could not resolve URL"
            fi
          done

          echo ""
          echo "=== run-e2e: polling all jobs ==="
          POLL_COUNT=0
          ELAPSED=0
          while [[ ${ELAPSED} -lt ${TIMEOUT} ]]; do
            PENDING=0
            for JOB_NAME in "${!JOB_IDS[@]}"; do
              [[ "${JOB_RESULTS[$JOB_NAME]}" != "pending" ]] && continue
              PENDING=$((PENDING + 1))
            done
            [[ ${PENDING} -eq 0 ]] && break

            POLL_COUNT=$((POLL_COUNT + 1))
            TIMESTAMP=$(date -u +%Y-%m-%dT%H:%M:%SZ)
            echo ""
            echo "[${TIMESTAMP}] Poll #${POLL_COUNT} (${ELAPSED}s) — ${PENDING} job(s) pending"

            for JOB_NAME in "${!JOB_IDS[@]}"; do
              [[ "${JOB_RESULTS[$JOB_NAME]}" != "pending" ]] && continue

              JOB_ID="${JOB_IDS[$JOB_NAME]}"
              SHORT_NAME=$(echo "${JOB_NAME}" | sed 's/periodic-ci-openshift-hypershift-release-5.0-periodics-//')

              POLL_RESPONSE=$(curl -s -w '\n%{http_code}' -H "Authorization: Bearer ${GANGWAY_TOKEN}" "${GANGWAY_URL}/${JOB_ID}")
              POLL_CODE=$(echo "${POLL_RESPONSE}" | tail -1)
              POLL_BODY=$(echo "${POLL_RESPONSE}" | sed '$d')

              if [[ "${POLL_CODE}" == "429" || "${POLL_CODE}" -ge 500 ]]; then
                echo "  [${SHORT_NAME}] HTTP ${POLL_CODE} — rate limited, will retry next cycle"
                continue
              elif [[ "${POLL_CODE}" != "200" ]]; then
                echo "  [${SHORT_NAME}] HTTP ${POLL_CODE} — auth error or unexpected failure"
                echo "  Raw response: ${POLL_BODY}"
                JOB_RESULTS["${JOB_NAME}"]="error"
                continue
              fi

              if ! echo "${POLL_BODY}" | jq empty 2>/dev/null; then
                echo "  [${SHORT_NAME}] response is not valid JSON"
                JOB_RESULTS["${JOB_NAME}"]="error"
                continue
              fi

              STATUS=$(echo "${POLL_BODY}" | jq -r '.job_status')
              echo "  [${SHORT_NAME}] ${STATUS}"

              case "${STATUS}" in
                SUCCESS)
                  JOB_RESULTS["${JOB_NAME}"]="passed"
                  echo "  [${SHORT_NAME}] PASSED"
                  ;;
                FAILURE|ABORTED|ERROR)
                  JOB_RESULTS["${JOB_NAME}"]="failed"
                  echo "  [${SHORT_NAME}] FAILED (${STATUS})"
                  ;;
              esac
            done

            PENDING_AFTER=0
            for JOB_NAME in "${!JOB_IDS[@]}"; do
              [[ "${JOB_RESULTS[$JOB_NAME]}" == "pending" ]] && PENDING_AFTER=$((PENDING_AFTER + 1))
            done
            [[ ${PENDING_AFTER} -eq 0 ]] && break

            sleep ${POLL_INTERVAL}
            ELAPSED=$((ELAPSED + POLL_INTERVAL))
          done

          for JOB_NAME in "${!JOB_RESULTS[@]}"; do
            if [[ "${JOB_RESULTS[$JOB_NAME]}" == "pending" ]]; then
              JOB_RESULTS["${JOB_NAME}"]="error"
              SHORT_NAME=$(echo "${JOB_NAME}" | sed 's/periodic-ci-openshift-hypershift-release-5.0-periodics-//')
              echo "  [${SHORT_NAME}] TIMEOUT"
            fi
          done

          echo ""
          echo "=== run-e2e: building results ==="
          RESULTS_JSON="["
          FIRST=true
          for i in $(seq 0 $((NUM_JOBS - 1))); do
            JOB_NAME=$(echo "${JOB_NAMES_JSON}" | jq -r ".[$i]")
            RESULT="${JOB_RESULTS[$JOB_NAME]}"
            URL="${JOB_URLS[$JOB_NAME]:-}"
            SHORT_NAME=$(echo "${JOB_NAME}" | sed 's/periodic-ci-openshift-hypershift-release-5.0-periodics-//')
            echo "  ${SHORT_NAME}: ${RESULT} (${URL})"
            if [[ "${FIRST}" == "true" ]]; then
              FIRST=false
            else
              RESULTS_JSON+=","
            fi
            RESULTS_JSON+="{\"job\":\"${JOB_NAME}\",\"result\":\"${RESULT}\",\"url\":\"${URL}\"}"
          done
          RESULTS_JSON+="]"

          echo ""
          echo "Results JSON: ${RESULTS_JSON}"
          echo -n "${RESULTS_JSON}" > $(results.results-json.path)
    params:
    - name: ho-image
      value: $(tasks.extract-image.results.ho-image)
    - name: e2e-job-names
      value: $(params.e2e-job-names)

  - name: evaluate-results
    runAfter: [run-e2e]
    taskSpec:
      params:
      - name: results-json
        type: string
      results:
      - name: gate-passed
        description: Whether the release gate passed (true/false)
      steps:
      - name: evaluate
        image: quay.io/konflux-ci/appstudio-utils:latest
        script: |
          #!/bin/bash
          set -euo pipefail

          RESULTS_JSON='$(params.results-json)'

          echo "=== evaluate-results ==="
          echo ""

          NUM_JOBS=$(echo "${RESULTS_JSON}" | jq -r 'length')
          GATE_PASSED="true"

          printf "%-50s %-10s %s\n" "JOB" "RESULT" "URL"
          printf "%-50s %-10s %s\n" "---" "------" "---"

          for i in $(seq 0 $((NUM_JOBS - 1))); do
            JOB=$(echo "${RESULTS_JSON}" | jq -r ".[$i].job" | sed 's/periodic-ci-openshift-hypershift-release-5.0-periodics-//')
            RESULT=$(echo "${RESULTS_JSON}" | jq -r ".[$i].result")
            URL=$(echo "${RESULTS_JSON}" | jq -r ".[$i].url")
            printf "%-50s %-10s %s\n" "${JOB}" "${RESULT}" "${URL}"
            if [[ "${RESULT}" != "passed" ]]; then
              GATE_PASSED="false"
            fi
          done

          echo ""
          echo "Gate verdict: ${GATE_PASSED} (${NUM_JOBS} job(s), AND logic)"
          echo -n "${GATE_PASSED}" > $(results.gate-passed.path)

          if [[ "${GATE_PASSED}" == "false" ]]; then
            echo ""
            echo "=== GATE FAILED — image will NOT be promoted ==="
            exit 1
          fi

          echo ""
          echo "=== GATE PASSED — proceeding to release ==="
    params:
    - name: results-json
      value: $(tasks.run-e2e.results.results-json)

  finally:
  - name: create-release
    when:
    - input: $(tasks.evaluate-results.results.gate-passed)
      operator: in
      values: ["true"]
    taskSpec:
      params:
      - name: snapshot-name
        type: string
      steps:
      - name: create
        image: registry.redhat.io/openshift4/ose-cli:latest
        env:
        - name: HOME
          value: /tekton/home
        script: |
          #!/bin/bash
          set -euo pipefail

          SNAPSHOT="$(params.snapshot-name)"

          echo "=== create-release ==="
          echo "Snapshot:     ${SNAPSHOT}"
          echo "ReleasePlan:  nightly-promotion-aro-hcp"

          RELEASE_OUTPUT=$(oc create -f - <<EOF
          apiVersion: appstudio.redhat.com/v1alpha1
          kind: Release
          metadata:
            generateName: nightly-promotion-aro-hcp-
            namespace: crt-redhat-acm-tenant
          spec:
            snapshot: ${SNAPSHOT}
            releasePlan: nightly-promotion-aro-hcp
            gracePeriodDays: 7
          EOF
          )

          RELEASE_NAME=$(echo "${RELEASE_OUTPUT}" | grep -oP 'release\.appstudio\.redhat\.com/\K[^ ]+' || echo "unknown")
          echo "Created:      ${RELEASE_NAME}"
          echo ""
          echo "=== create-release: done ==="
    params:
    - name: snapshot-name
      value: $(tasks.extract-image.results.snapshot-name)
