default_stages: [pre-commit, pre-push]
default_install_hook_types: [pre-commit, pre-push, post-checkout]
repos:
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v5.0.0
    hooks:
      - id: check-merge-conflict
        name: Check for merge conflict strings
        stages: [pre-commit]
      - id: check-yaml
        name: Check yaml syntax
        args: [--allow-multiple-documents]
        stages: [pre-commit]
      - id: trailing-whitespace
        name: Trim all whitespace from end of lines
        stages: [pre-commit]
        args:
          - --markdown-linebreak-ext=md
  - repo: local
    hooks:
      - id: make-codespell
        name: Verify codespell
        description: Runs `make verify-codespell` to verify codespell format.
        entry: make verify-codespell
        language: system
        stages: [pre-commit]
      - id: cpo-containerfiles-in-sync
        name: Keep cpo-containerfiles-in-sync
        entry: ./hack/tools/git-hooks/cpo-containerfiles-in-sync.sh
        language: script
        pass_filenames: false
        args:
          - Containerfile.control-plane
          - Dockerfile.control-plane
        description: Ensures the CPO container files stay in sync
        stages: [pre-commit]
      - id: api-lint-fix
        name: Sort API imports
        description: Runs `make api-lint-fix` to sort imports in the api/ module.
        entry: make api-lint-fix PULL_BASE_SHA=HEAD
        language: system
        stages: [pre-commit]
        files: '^api/.*\.go$'
      - id: main-lint-fix
        name: Sort imports
        description: Runs `make main-lint-fix` to sort imports in the main module.
        entry: make main-lint-fix PULL_BASE_SHA=HEAD
        language: system
        stages: [pre-commit]
        files: '\.go$'
        exclude: '^api/'
      - id: run-gitlint
        name: Run gitlint
        description: Runs `make run-gitlint` to validate commit messages.
        entry: make run-gitlint
        language: system
        stages: [pre-commit]
      - id: clean-stale-mocks
        name: Clean stale mock files
        description: Removes gitignored *_mock.go files that may be stale after a branch switch.
        entry: find . -name '*_mock.go' -not -path '*/vendor/*' -delete
        language: system
        stages: [post-checkout]
        always_run: true
      - id: make-verify
        name: Run make verify
        description: Runs `make verify`.
        entry: make verify
        language: system
        stages: [pre-push]
        require_serial: true
      - id: make-test
        name: Run make test
        description: Runs `make test` without race detection for faster hook feedback.
        entry: make test GO_TEST_FLAGS=
        language: system
        stages: [ pre-push ]
exclude: '^vendor/|^hack/tools/vendor/|^api/vendor/'
fail_fast: false
