apiVersion: apiextensions.k8s.io/v1
name: "NodePool KubeVirt additionalNetworks validation"
crdName: nodepools.hypershift.openshift.io
version: v1beta1
tests:
  onCreate:
  # --- additionalNetworks name format validation ---
  - name: when additionalNetworks name is valid namespace/name format it should pass
    initial: |
      apiVersion: hypershift.openshift.io/v1beta1
      kind: NodePool
      spec:
        arch: amd64
        clusterName: some-cluster
        management:
          autoRepair: false
          upgradeType: Replace
        release:
          image: quay.io/openshift-release-dev/ocp-release:4.17.0-rc.0-x86_64
        replicas: 0
        platform:
          kubevirt:
            rootVolume:
              type: Persistent
              persistent:
                size: 32Gi
            additionalNetworks:
              - name: "my-ns/my-nad"
          type: KubeVirt

  - name: when additionalNetworks has multiple valid networks it should pass
    initial: |
      apiVersion: hypershift.openshift.io/v1beta1
      kind: NodePool
      spec:
        arch: amd64
        clusterName: some-cluster
        management:
          autoRepair: false
          upgradeType: Replace
        release:
          image: quay.io/openshift-release-dev/ocp-release:4.17.0-rc.0-x86_64
        replicas: 0
        platform:
          kubevirt:
            rootVolume:
              type: Persistent
              persistent:
                size: 32Gi
            additionalNetworks:
              - name: "ns-a/nad-1"
              - name: "ns-b/nad-2"
          type: KubeVirt

  - name: when additionalNetworks name has no slash it should fail
    initial: |
      apiVersion: hypershift.openshift.io/v1beta1
      kind: NodePool
      spec:
        arch: amd64
        clusterName: some-cluster
        management:
          autoRepair: false
          upgradeType: Replace
        release:
          image: quay.io/openshift-release-dev/ocp-release:4.17.0-rc.0-x86_64
        replicas: 0
        platform:
          kubevirt:
            rootVolume:
              type: Persistent
              persistent:
                size: 32Gi
            additionalNetworks:
              - name: "just-a-name"
          type: KubeVirt
    expectedError: "name must be in the format <namespace>/<name>"

  - name: when additionalNetworks name has multiple slashes it should fail
    initial: |
      apiVersion: hypershift.openshift.io/v1beta1
      kind: NodePool
      spec:
        arch: amd64
        clusterName: some-cluster
        management:
          autoRepair: false
          upgradeType: Replace
        release:
          image: quay.io/openshift-release-dev/ocp-release:4.17.0-rc.0-x86_64
        replicas: 0
        platform:
          kubevirt:
            rootVolume:
              type: Persistent
              persistent:
                size: 32Gi
            additionalNetworks:
              - name: "ns/sub/name"
          type: KubeVirt
    expectedError: "name must be in the format <namespace>/<name>"

  - name: when additionalNetworks name has empty namespace it should fail
    initial: |
      apiVersion: hypershift.openshift.io/v1beta1
      kind: NodePool
      spec:
        arch: amd64
        clusterName: some-cluster
        management:
          autoRepair: false
          upgradeType: Replace
        release:
          image: quay.io/openshift-release-dev/ocp-release:4.17.0-rc.0-x86_64
        replicas: 0
        platform:
          kubevirt:
            rootVolume:
              type: Persistent
              persistent:
                size: 32Gi
            additionalNetworks:
              - name: "/my-nad"
          type: KubeVirt
    expectedError: "name must be in the format <namespace>/<name>"

  - name: when additionalNetworks name has empty name segment it should fail
    initial: |
      apiVersion: hypershift.openshift.io/v1beta1
      kind: NodePool
      spec:
        arch: amd64
        clusterName: some-cluster
        management:
          autoRepair: false
          upgradeType: Replace
        release:
          image: quay.io/openshift-release-dev/ocp-release:4.17.0-rc.0-x86_64
        replicas: 0
        platform:
          kubevirt:
            rootVolume:
              type: Persistent
              persistent:
                size: 32Gi
            additionalNetworks:
              - name: "my-ns/"
          type: KubeVirt
    expectedError: "name must be in the format <namespace>/<name>"

  - name: when additionalNetworks name has whitespace in namespace it should fail
    initial: |
      apiVersion: hypershift.openshift.io/v1beta1
      kind: NodePool
      spec:
        arch: amd64
        clusterName: some-cluster
        management:
          autoRepair: false
          upgradeType: Replace
        release:
          image: quay.io/openshift-release-dev/ocp-release:4.17.0-rc.0-x86_64
        replicas: 0
        platform:
          kubevirt:
            rootVolume:
              type: Persistent
              persistent:
                size: 32Gi
            additionalNetworks:
              - name: " /name"
          type: KubeVirt
    expectedError: "name must be in the format <namespace>/<name>"

  - name: when additionalNetworks name has whitespace in name segment it should fail
    initial: |
      apiVersion: hypershift.openshift.io/v1beta1
      kind: NodePool
      spec:
        arch: amd64
        clusterName: some-cluster
        management:
          autoRepair: false
          upgradeType: Replace
        release:
          image: quay.io/openshift-release-dev/ocp-release:4.17.0-rc.0-x86_64
        replicas: 0
        platform:
          kubevirt:
            rootVolume:
              type: Persistent
              persistent:
                size: 32Gi
            additionalNetworks:
              - name: "my-ns/my nad"
          type: KubeVirt
    expectedError: "name must be in the format <namespace>/<name>"

  - name: when additionalNetworks name has dot in name segment it should fail
    initial: |
      apiVersion: hypershift.openshift.io/v1beta1
      kind: NodePool
      spec:
        arch: amd64
        clusterName: some-cluster
        management:
          autoRepair: false
          upgradeType: Replace
        release:
          image: quay.io/openshift-release-dev/ocp-release:4.17.0-rc.0-x86_64
        replicas: 0
        platform:
          kubevirt:
            rootVolume:
              type: Persistent
              persistent:
                size: 32Gi
            additionalNetworks:
              - name: "my-ns/my.nad"
          type: KubeVirt
    expectedError: "name must be in the format <namespace>/<name>"

  - name: when additionalNetworks name has uppercase characters it should fail
    initial: |
      apiVersion: hypershift.openshift.io/v1beta1
      kind: NodePool
      spec:
        arch: amd64
        clusterName: some-cluster
        management:
          autoRepair: false
          upgradeType: Replace
        release:
          image: quay.io/openshift-release-dev/ocp-release:4.17.0-rc.0-x86_64
        replicas: 0
        platform:
          kubevirt:
            rootVolume:
              type: Persistent
              persistent:
                size: 32Gi
            additionalNetworks:
              - name: "My-ns/my-nad"
          type: KubeVirt
    expectedError: "name must be in the format <namespace>/<name>"

  - name: when additionalNetworks name has underscore in namespace it should fail
    initial: |
      apiVersion: hypershift.openshift.io/v1beta1
      kind: NodePool
      spec:
        arch: amd64
        clusterName: some-cluster
        management:
          autoRepair: false
          upgradeType: Replace
        release:
          image: quay.io/openshift-release-dev/ocp-release:4.17.0-rc.0-x86_64
        replicas: 0
        platform:
          kubevirt:
            rootVolume:
              type: Persistent
              persistent:
                size: 32Gi
            additionalNetworks:
              - name: "my_ns/my-nad"
          type: KubeVirt
    expectedError: "name must be in the format <namespace>/<name>"

  - name: when additionalNetworks has duplicate names it should fail
    initial: |
      apiVersion: hypershift.openshift.io/v1beta1
      kind: NodePool
      spec:
        arch: amd64
        clusterName: some-cluster
        management:
          autoRepair: false
          upgradeType: Replace
        release:
          image: quay.io/openshift-release-dev/ocp-release:4.17.0-rc.0-x86_64
        replicas: 0
        platform:
          kubevirt:
            rootVolume:
              type: Persistent
              persistent:
                size: 32Gi
            additionalNetworks:
              - name: "ns/nad1"
              - name: "ns/nad1"
          type: KubeVirt
    expectedError: "Duplicate value"

  - name: when additionalNetworks name is at max length 55 it should pass
    initial: |
      apiVersion: hypershift.openshift.io/v1beta1
      kind: NodePool
      spec:
        arch: amd64
        clusterName: some-cluster
        management:
          autoRepair: false
          upgradeType: Replace
        release:
          image: quay.io/openshift-release-dev/ocp-release:4.17.0-rc.0-x86_64
        replicas: 0
        platform:
          kubevirt:
            rootVolume:
              type: Persistent
              persistent:
                size: 32Gi
            additionalNetworks:
              - name: "my-namespace-name-that-is-long/my-nad-name-also-long-ab"
          type: KubeVirt

  - name: when additionalNetworks name exceeds max length 55 it should fail
    initial: |
      apiVersion: hypershift.openshift.io/v1beta1
      kind: NodePool
      spec:
        arch: amd64
        clusterName: some-cluster
        management:
          autoRepair: false
          upgradeType: Replace
        release:
          image: quay.io/openshift-release-dev/ocp-release:4.17.0-rc.0-x86_64
        replicas: 0
        platform:
          kubevirt:
            rootVolume:
              type: Persistent
              persistent:
                size: 32Gi
            additionalNetworks:
              - name: "my-namespace-name-that-is-long/my-nad-name-also-long-abc"
          type: KubeVirt
    expectedError: "Too long"
