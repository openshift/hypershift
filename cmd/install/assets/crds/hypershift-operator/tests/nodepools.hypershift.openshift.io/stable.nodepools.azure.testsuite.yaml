apiVersion: apiextensions.k8s.io/v1
name: "NodePool Azure validation"
crdName: nodepools.hypershift.openshift.io
version: v1beta1
tests:
  onCreate:
  # --- Azure VM image validation ---
  - name: when marketplace is fully populated with imageGeneration set it should pass
    initial: |
      apiVersion: hypershift.openshift.io/v1beta1
      kind: NodePool
      spec:
        arch: amd64
        clusterName: some-cluster
        management:
          autoRepair: false
          upgradeType: Replace
        release:
          image: quay.io/openshift-release-dev/ocp-release:4.17.0-rc.0-x86_64
        replicas: 0
        platform:
          azure:
            vmSize: Standard_D4s_v5
            image:
              type: AzureMarketplace
              azureMarketplace:
                publisher: azureopenshift
                offer: aro4
                sku: aro_417_rhel8_gen2
                version: "417.94.20240701"
                imageGeneration: Gen2
            osDisk:
              diskStorageAccountType: Premium_LRS
            subnetID: "/subscriptions/12345678-1234-5678-9012-123456789012/resourceGroups/test-rg/providers/Microsoft.Network/virtualNetworks/test-vnet/subnets/test-subnet"
          type: Azure

  - name: when marketplace is fully populated without imageGeneration it should pass
    initial: |
      apiVersion: hypershift.openshift.io/v1beta1
      kind: NodePool
      spec:
        arch: amd64
        clusterName: some-cluster
        management:
          autoRepair: false
          upgradeType: Replace
        release:
          image: quay.io/openshift-release-dev/ocp-release:4.17.0-rc.0-x86_64
        replicas: 0
        platform:
          azure:
            vmSize: Standard_D4s_v5
            image:
              type: AzureMarketplace
              azureMarketplace:
                publisher: azureopenshift
                offer: aro4
                sku: aro_417_rhel8_gen2
                version: "417.94.20240701"
            osDisk:
              diskStorageAccountType: Premium_LRS
            subnetID: "/subscriptions/12345678-1234-5678-9012-123456789012/resourceGroups/test-rg/providers/Microsoft.Network/virtualNetworks/test-vnet/subnets/test-subnet"
          type: Azure

  - name: when type is AzureMarketplace with empty marketplace struct and imageGeneration is set it should pass
    initial: |
      apiVersion: hypershift.openshift.io/v1beta1
      kind: NodePool
      spec:
        arch: amd64
        clusterName: some-cluster
        management:
          autoRepair: false
          upgradeType: Replace
        release:
          image: quay.io/openshift-release-dev/ocp-release:4.17.0-rc.0-x86_64
        replicas: 0
        platform:
          azure:
            vmSize: Standard_D4s_v5
            image:
              type: AzureMarketplace
              azureMarketplace:
                imageGeneration: Gen2
            osDisk:
              diskStorageAccountType: Premium_LRS
            subnetID: "/subscriptions/12345678-1234-5678-9012-123456789012/resourceGroups/test-rg/providers/Microsoft.Network/virtualNetworks/test-vnet/subnets/test-subnet"
          type: Azure

  - name: when type is AzureMarketplace with empty marketplace struct it should pass (allows defaulting)
    initial: |
      apiVersion: hypershift.openshift.io/v1beta1
      kind: NodePool
      spec:
        arch: amd64
        clusterName: some-cluster
        management:
          autoRepair: false
          upgradeType: Replace
        release:
          image: quay.io/openshift-release-dev/ocp-release:4.17.0-rc.0-x86_64
        replicas: 0
        platform:
          azure:
            vmSize: Standard_D4s_v5
            image:
              type: AzureMarketplace
              azureMarketplace: {}
            osDisk:
              diskStorageAccountType: Premium_LRS
            subnetID: "/subscriptions/12345678-1234-5678-9012-123456789012/resourceGroups/test-rg/providers/Microsoft.Network/virtualNetworks/test-vnet/subnets/test-subnet"
          type: Azure

  - name: when marketplace has only publisher and offer but not sku and version it should fail
    initial: |
      apiVersion: hypershift.openshift.io/v1beta1
      kind: NodePool
      spec:
        arch: amd64
        clusterName: some-cluster
        management:
          autoRepair: false
          upgradeType: Replace
        release:
          image: quay.io/openshift-release-dev/ocp-release:4.17.0-rc.0-x86_64
        replicas: 0
        platform:
          azure:
            vmSize: Standard_D4s_v5
            image:
              type: AzureMarketplace
              azureMarketplace:
                publisher: azureopenshift
                offer: aro4
            osDisk:
              diskStorageAccountType: Premium_LRS
            subnetID: "/subscriptions/12345678-1234-5678-9012-123456789012/resourceGroups/test-rg/providers/Microsoft.Network/virtualNetworks/test-vnet/subnets/test-subnet"
          type: Azure
    expectedError: "publisher, offer, sku and version must either be all set, or all omitted"

  - name: when marketplace has only sku without publisher, offer, and version it should fail
    initial: |
      apiVersion: hypershift.openshift.io/v1beta1
      kind: NodePool
      spec:
        arch: amd64
        clusterName: some-cluster
        management:
          autoRepair: false
          upgradeType: Replace
        release:
          image: quay.io/openshift-release-dev/ocp-release:4.17.0-rc.0-x86_64
        replicas: 0
        platform:
          azure:
            vmSize: Standard_D4s_v5
            image:
              type: AzureMarketplace
              azureMarketplace:
                sku: aro_417_rhel8_gen2
            osDisk:
              diskStorageAccountType: Premium_LRS
            subnetID: "/subscriptions/12345678-1234-5678-9012-123456789012/resourceGroups/test-rg/providers/Microsoft.Network/virtualNetworks/test-vnet/subnets/test-subnet"
          type: Azure
    expectedError: "publisher, offer, sku and version must either be all set, or all omitted"

  - name: when marketplace has publisher, offer, sku but not version it should fail
    initial: |
      apiVersion: hypershift.openshift.io/v1beta1
      kind: NodePool
      spec:
        arch: amd64
        clusterName: some-cluster
        management:
          autoRepair: false
          upgradeType: Replace
        release:
          image: quay.io/openshift-release-dev/ocp-release:4.17.0-rc.0-x86_64
        replicas: 0
        platform:
          azure:
            vmSize: Standard_D4s_v5
            image:
              type: AzureMarketplace
              azureMarketplace:
                publisher: azureopenshift
                offer: aro4
                sku: aro_417_rhel8_gen2
            osDisk:
              diskStorageAccountType: Premium_LRS
            subnetID: "/subscriptions/12345678-1234-5678-9012-123456789012/resourceGroups/test-rg/providers/Microsoft.Network/virtualNetworks/test-vnet/subnets/test-subnet"
          type: Azure
    expectedError: "publisher, offer, sku and version must either be all set, or all omitted"
