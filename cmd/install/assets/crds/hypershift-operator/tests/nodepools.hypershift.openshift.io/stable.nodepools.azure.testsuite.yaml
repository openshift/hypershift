apiVersion: apiextensions.k8s.io/v1
name: "NodePool Azure validation"
crdName: nodepools.hypershift.openshift.io
version: v1beta1
tests:
  onCreate:
  # --- Azure VM image validation ---
  - name: when marketplace is fully populated with imageGeneration set it should pass
    initial: |
      apiVersion: hypershift.openshift.io/v1beta1
      kind: NodePool
      spec:
        arch: amd64
        clusterName: some-cluster
        management:
          autoRepair: false
          upgradeType: Replace
        release:
          image: quay.io/openshift-release-dev/ocp-release:4.17.0-rc.0-x86_64
        replicas: 0
        platform:
          azure:
            vmSize: Standard_D4s_v5
            image:
              type: AzureMarketplace
              azureMarketplace:
                publisher: azureopenshift
                offer: aro4
                sku: aro_417_rhel8_gen2
                version: "417.94.20240701"
                imageGeneration: Gen2
            osDisk:
              diskStorageAccountType: Premium_LRS
            subnetID: "/subscriptions/12345678-1234-5678-9012-123456789012/resourceGroups/test-rg/providers/Microsoft.Network/virtualNetworks/test-vnet/subnets/test-subnet"
          type: Azure

  - name: when marketplace is fully populated without imageGeneration it should pass
    initial: |
      apiVersion: hypershift.openshift.io/v1beta1
      kind: NodePool
      spec:
        arch: amd64
        clusterName: some-cluster
        management:
          autoRepair: false
          upgradeType: Replace
        release:
          image: quay.io/openshift-release-dev/ocp-release:4.17.0-rc.0-x86_64
        replicas: 0
        platform:
          azure:
            vmSize: Standard_D4s_v5
            image:
              type: AzureMarketplace
              azureMarketplace:
                publisher: azureopenshift
                offer: aro4
                sku: aro_417_rhel8_gen2
                version: "417.94.20240701"
            osDisk:
              diskStorageAccountType: Premium_LRS
            subnetID: "/subscriptions/12345678-1234-5678-9012-123456789012/resourceGroups/test-rg/providers/Microsoft.Network/virtualNetworks/test-vnet/subnets/test-subnet"
          type: Azure

  - name: when type is AzureMarketplace with empty marketplace struct and imageGeneration is set it should pass
    initial: |
      apiVersion: hypershift.openshift.io/v1beta1
      kind: NodePool
      spec:
        arch: amd64
        clusterName: some-cluster
        management:
          autoRepair: false
          upgradeType: Replace
        release:
          image: quay.io/openshift-release-dev/ocp-release:4.17.0-rc.0-x86_64
        replicas: 0
        platform:
          azure:
            vmSize: Standard_D4s_v5
            image:
              type: AzureMarketplace
              azureMarketplace:
                imageGeneration: Gen2
            osDisk:
              diskStorageAccountType: Premium_LRS
            subnetID: "/subscriptions/12345678-1234-5678-9012-123456789012/resourceGroups/test-rg/providers/Microsoft.Network/virtualNetworks/test-vnet/subnets/test-subnet"
          type: Azure

  - name: when type is AzureMarketplace with empty marketplace struct it should pass (allows defaulting)
    initial: |
      apiVersion: hypershift.openshift.io/v1beta1
      kind: NodePool
      spec:
        arch: amd64
        clusterName: some-cluster
        management:
          autoRepair: false
          upgradeType: Replace
        release:
          image: quay.io/openshift-release-dev/ocp-release:4.17.0-rc.0-x86_64
        replicas: 0
        platform:
          azure:
            vmSize: Standard_D4s_v5
            image:
              type: AzureMarketplace
              azureMarketplace: {}
            osDisk:
              diskStorageAccountType: Premium_LRS
            subnetID: "/subscriptions/12345678-1234-5678-9012-123456789012/resourceGroups/test-rg/providers/Microsoft.Network/virtualNetworks/test-vnet/subnets/test-subnet"
          type: Azure

  - name: when marketplace has only publisher and offer but not sku and version it should fail
    initial: |
      apiVersion: hypershift.openshift.io/v1beta1
      kind: NodePool
      spec:
        arch: amd64
        clusterName: some-cluster
        management:
          autoRepair: false
          upgradeType: Replace
        release:
          image: quay.io/openshift-release-dev/ocp-release:4.17.0-rc.0-x86_64
        replicas: 0
        platform:
          azure:
            vmSize: Standard_D4s_v5
            image:
              type: AzureMarketplace
              azureMarketplace:
                publisher: azureopenshift
                offer: aro4
            osDisk:
              diskStorageAccountType: Premium_LRS
            subnetID: "/subscriptions/12345678-1234-5678-9012-123456789012/resourceGroups/test-rg/providers/Microsoft.Network/virtualNetworks/test-vnet/subnets/test-subnet"
          type: Azure
    expectedError: "publisher, offer, sku and version must either be all set, or all omitted"

  - name: when marketplace has only sku without publisher, offer, and version it should fail
    initial: |
      apiVersion: hypershift.openshift.io/v1beta1
      kind: NodePool
      spec:
        arch: amd64
        clusterName: some-cluster
        management:
          autoRepair: false
          upgradeType: Replace
        release:
          image: quay.io/openshift-release-dev/ocp-release:4.17.0-rc.0-x86_64
        replicas: 0
        platform:
          azure:
            vmSize: Standard_D4s_v5
            image:
              type: AzureMarketplace
              azureMarketplace:
                sku: aro_417_rhel8_gen2
            osDisk:
              diskStorageAccountType: Premium_LRS
            subnetID: "/subscriptions/12345678-1234-5678-9012-123456789012/resourceGroups/test-rg/providers/Microsoft.Network/virtualNetworks/test-vnet/subnets/test-subnet"
          type: Azure
    expectedError: "publisher, offer, sku and version must either be all set, or all omitted"

  - name: when marketplace has publisher, offer, sku but not version it should fail
    initial: |
      apiVersion: hypershift.openshift.io/v1beta1
      kind: NodePool
      spec:
        arch: amd64
        clusterName: some-cluster
        management:
          autoRepair: false
          upgradeType: Replace
        release:
          image: quay.io/openshift-release-dev/ocp-release:4.17.0-rc.0-x86_64
        replicas: 0
        platform:
          azure:
            vmSize: Standard_D4s_v5
            image:
              type: AzureMarketplace
              azureMarketplace:
                publisher: azureopenshift
                offer: aro4
                sku: aro_417_rhel8_gen2
            osDisk:
              diskStorageAccountType: Premium_LRS
            subnetID: "/subscriptions/12345678-1234-5678-9012-123456789012/resourceGroups/test-rg/providers/Microsoft.Network/virtualNetworks/test-vnet/subnets/test-subnet"
          type: Azure
    expectedError: "publisher, offer, sku and version must either be all set, or all omitted"

  # --- ACR image registry credentials validation ---
  - name: when imageRegistryCredentials is not set it should pass
    initial: |
      apiVersion: hypershift.openshift.io/v1beta1
      kind: NodePool
      spec:
        arch: amd64
        clusterName: some-cluster
        management:
          autoRepair: false
          upgradeType: Replace
        release:
          image: quay.io/openshift-release-dev/ocp-release:4.17.0-rc.0-x86_64
        replicas: 0
        platform:
          azure:
            vmSize: Standard_D4s_v5
            image:
              type: ImageID
              imageID: "/subscriptions/12345678-1234-5678-9012-123456789012/resourceGroups/test-rg/providers/Microsoft.Compute/images/test-image"
            osDisk:
              diskStorageAccountType: Premium_LRS
            subnetID: "/subscriptions/12345678-1234-5678-9012-123456789012/resourceGroups/test-rg/providers/Microsoft.Network/virtualNetworks/test-vnet/subnets/test-subnet"
          type: Azure

  - name: when imageRegistryCredentials has a valid managedIdentity it should pass
    initial: |
      apiVersion: hypershift.openshift.io/v1beta1
      kind: NodePool
      spec:
        arch: amd64
        clusterName: some-cluster
        management:
          autoRepair: false
          upgradeType: Replace
        release:
          image: quay.io/openshift-release-dev/ocp-release:4.17.0-rc.0-x86_64
        replicas: 0
        platform:
          azure:
            vmSize: Standard_D4s_v5
            image:
              type: ImageID
              imageID: "/subscriptions/12345678-1234-5678-9012-123456789012/resourceGroups/test-rg/providers/Microsoft.Compute/images/test-image"
            osDisk:
              diskStorageAccountType: Premium_LRS
            subnetID: "/subscriptions/12345678-1234-5678-9012-123456789012/resourceGroups/test-rg/providers/Microsoft.Network/virtualNetworks/test-vnet/subnets/test-subnet"
            imageRegistryCredentials:
              managedIdentity:
                resourceID: "/subscriptions/12345678-1234-5678-9012-123456789012/resourceGroups/test-rg/providers/Microsoft.ManagedIdentity/userAssignedIdentities/acr-pull"
          type: Azure

  - name: when imageRegistryCredentials has lowercase resourcegroups it should fail
    initial: |
      apiVersion: hypershift.openshift.io/v1beta1
      kind: NodePool
      spec:
        arch: amd64
        clusterName: some-cluster
        management:
          autoRepair: false
          upgradeType: Replace
        release:
          image: quay.io/openshift-release-dev/ocp-release:4.17.0-rc.0-x86_64
        replicas: 0
        platform:
          azure:
            vmSize: Standard_D4s_v5
            image:
              type: ImageID
              imageID: "/subscriptions/12345678-1234-5678-9012-123456789012/resourceGroups/test-rg/providers/Microsoft.Compute/images/test-image"
            osDisk:
              diskStorageAccountType: Premium_LRS
            subnetID: "/subscriptions/12345678-1234-5678-9012-123456789012/resourceGroups/test-rg/providers/Microsoft.Network/virtualNetworks/test-vnet/subnets/test-subnet"
            imageRegistryCredentials:
              managedIdentity:
                resourceID: "/subscriptions/12345678-1234-5678-9012-123456789012/resourcegroups/test-rg/providers/Microsoft.ManagedIdentity/userAssignedIdentities/acr-pull"
          type: Azure
    expectedError: "must be a valid ARM resource ID for a user-assigned managed identity"

  - name: when imageRegistryCredentials has an invalid managedIdentity format it should fail
    initial: |
      apiVersion: hypershift.openshift.io/v1beta1
      kind: NodePool
      spec:
        arch: amd64
        clusterName: some-cluster
        management:
          autoRepair: false
          upgradeType: Replace
        release:
          image: quay.io/openshift-release-dev/ocp-release:4.17.0-rc.0-x86_64
        replicas: 0
        platform:
          azure:
            vmSize: Standard_D4s_v5
            image:
              type: ImageID
              imageID: "/subscriptions/12345678-1234-5678-9012-123456789012/resourceGroups/test-rg/providers/Microsoft.Compute/images/test-image"
            osDisk:
              diskStorageAccountType: Premium_LRS
            subnetID: "/subscriptions/12345678-1234-5678-9012-123456789012/resourceGroups/test-rg/providers/Microsoft.Network/virtualNetworks/test-vnet/subnets/test-subnet"
            imageRegistryCredentials:
              managedIdentity:
                resourceID: "not-a-valid-arm-resource-id"
          type: Azure
    expectedError: "must be a valid ARM resource ID for a user-assigned managed identity"

  - name: when imageRegistryCredentials has a wrong provider type it should fail
    initial: |
      apiVersion: hypershift.openshift.io/v1beta1
      kind: NodePool
      spec:
        arch: amd64
        clusterName: some-cluster
        management:
          autoRepair: false
          upgradeType: Replace
        release:
          image: quay.io/openshift-release-dev/ocp-release:4.17.0-rc.0-x86_64
        replicas: 0
        platform:
          azure:
            vmSize: Standard_D4s_v5
            image:
              type: ImageID
              imageID: "/subscriptions/12345678-1234-5678-9012-123456789012/resourceGroups/test-rg/providers/Microsoft.Compute/images/test-image"
            osDisk:
              diskStorageAccountType: Premium_LRS
            subnetID: "/subscriptions/12345678-1234-5678-9012-123456789012/resourceGroups/test-rg/providers/Microsoft.Network/virtualNetworks/test-vnet/subnets/test-subnet"
            imageRegistryCredentials:
              managedIdentity:
                resourceID: "/subscriptions/12345678-1234-5678-9012-123456789012/resourceGroups/test-rg/providers/Microsoft.Compute/virtualMachines/my-vm"
          type: Azure
    expectedError: "must be a valid ARM resource ID for a user-assigned managed identity"

  - name: when imageRegistryCredentials has a resourceID missing the identity name it should fail
    initial: |
      apiVersion: hypershift.openshift.io/v1beta1
      kind: NodePool
      spec:
        arch: amd64
        clusterName: some-cluster
        management:
          autoRepair: false
          upgradeType: Replace
        release:
          image: quay.io/openshift-release-dev/ocp-release:4.17.0-rc.0-x86_64
        replicas: 0
        platform:
          azure:
            vmSize: Standard_D4s_v5
            image:
              type: ImageID
              imageID: "/subscriptions/12345678-1234-5678-9012-123456789012/resourceGroups/test-rg/providers/Microsoft.Compute/images/test-image"
            osDisk:
              diskStorageAccountType: Premium_LRS
            subnetID: "/subscriptions/12345678-1234-5678-9012-123456789012/resourceGroups/test-rg/providers/Microsoft.Network/virtualNetworks/test-vnet/subnets/test-subnet"
            imageRegistryCredentials:
              managedIdentity:
                resourceID: "/subscriptions/12345678-1234-5678-9012-123456789012/resourceGroups/test-rg/providers/Microsoft.ManagedIdentity/userAssignedIdentities/"
          type: Azure
    expectedError: "must be a valid ARM resource ID for a user-assigned managed identity"

  - name: when imageRegistryCredentials has a resourceID with extra path segments it should fail
    initial: |
      apiVersion: hypershift.openshift.io/v1beta1
      kind: NodePool
      spec:
        arch: amd64
        clusterName: some-cluster
        management:
          autoRepair: false
          upgradeType: Replace
        release:
          image: quay.io/openshift-release-dev/ocp-release:4.17.0-rc.0-x86_64
        replicas: 0
        platform:
          azure:
            vmSize: Standard_D4s_v5
            image:
              type: ImageID
              imageID: "/subscriptions/12345678-1234-5678-9012-123456789012/resourceGroups/test-rg/providers/Microsoft.Compute/images/test-image"
            osDisk:
              diskStorageAccountType: Premium_LRS
            subnetID: "/subscriptions/12345678-1234-5678-9012-123456789012/resourceGroups/test-rg/providers/Microsoft.Network/virtualNetworks/test-vnet/subnets/test-subnet"
            imageRegistryCredentials:
              managedIdentity:
                resourceID: "/subscriptions/12345678-1234-5678-9012-123456789012/resourceGroups/test-rg/providers/Microsoft.ManagedIdentity/userAssignedIdentities/my-identity/extra"
          type: Azure
    expectedError: "must be a valid ARM resource ID for a user-assigned managed identity"

