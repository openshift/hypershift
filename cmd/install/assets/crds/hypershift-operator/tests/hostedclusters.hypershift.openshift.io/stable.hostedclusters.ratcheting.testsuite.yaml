apiVersion: apiextensions.k8s.io/v1
name: "HostedCluster ratcheting validation"
crdName: hostedclusters.hypershift.openshift.io
version: v1beta1
tests:
  onUpdate:
  - name: When updating a previously invalid baseDomainPrefix to a new invalid value it should fail
    initialCRDPatches:
      # Remove the baseDomainPrefix validation so the initial object can be created
      # with a value that would normally be rejected.
      - op: remove
        path: /spec/versions/0/schema/openAPIV3Schema/properties/spec/properties/dns/properties/baseDomainPrefix/x-kubernetes-validations/0
    initial: |
      apiVersion: hypershift.openshift.io/v1beta1
      kind: HostedCluster
      spec:
        dns:
          baseDomain: example.com
          baseDomainPrefix: "@invalid-prefix"
        platform:
          type: AWS
        pullSecret:
          name: secret
        release:
          image: quay.io/openshift-release-dev/ocp-release:4.15.11-x86_64
        secretEncryption:
          aescbc:
            activeKey:
              name: key
          type: aescbc
        services:
        - service: APIServer
          servicePublishingStrategy:
            type: Route
            route: {}
        - service: OAuthServer
          servicePublishingStrategy:
            type: Route
            route: {}
        - service: Konnectivity
          servicePublishingStrategy:
            type: Route
            route: {}
        - service: Ignition
          servicePublishingStrategy:
            type: Route
            route: {}
    updated: |
      apiVersion: hypershift.openshift.io/v1beta1
      kind: HostedCluster
      spec:
        dns:
          baseDomain: example.com
          baseDomainPrefix: "@still-invalid"
        platform:
          type: AWS
        pullSecret:
          name: secret
        release:
          image: quay.io/openshift-release-dev/ocp-release:4.15.11-x86_64
        secretEncryption:
          aescbc:
            activeKey:
              name: key
          type: aescbc
        services:
        - service: APIServer
          servicePublishingStrategy:
            type: Route
            route: {}
        - service: OAuthServer
          servicePublishingStrategy:
            type: Route
            route: {}
        - service: Konnectivity
          servicePublishingStrategy:
            type: Route
            route: {}
        - service: Ignition
          servicePublishingStrategy:
            type: Route
            route: {}
    expectedError: "baseDomainPrefix must be a valid domain name"

  - name: When updating a legit field while a previously invalid baseDomainPrefix is unchanged it should pass
    initialCRDPatches:
      # Remove the baseDomainPrefix validation so the initial object can be created
      # with a value that would normally be rejected.
      - op: remove
        path: /spec/versions/0/schema/openAPIV3Schema/properties/spec/properties/dns/properties/baseDomainPrefix/x-kubernetes-validations/0
    initial: |
      apiVersion: hypershift.openshift.io/v1beta1
      kind: HostedCluster
      spec:
        dns:
          baseDomain: example.com
          baseDomainPrefix: "@invalid-prefix"
        platform:
          type: AWS
        pullSecret:
          name: secret
        release:
          image: quay.io/openshift-release-dev/ocp-release:4.15.11-x86_64
        secretEncryption:
          aescbc:
            activeKey:
              name: key
          type: aescbc
        services:
        - service: APIServer
          servicePublishingStrategy:
            type: Route
            route: {}
        - service: OAuthServer
          servicePublishingStrategy:
            type: Route
            route: {}
        - service: Konnectivity
          servicePublishingStrategy:
            type: Route
            route: {}
        - service: Ignition
          servicePublishingStrategy:
            type: Route
            route: {}
    updated: |
      apiVersion: hypershift.openshift.io/v1beta1
      kind: HostedCluster
      spec:
        dns:
          baseDomain: example.com
          baseDomainPrefix: "@invalid-prefix"
        platform:
          type: AWS
        pullSecret:
          name: secret
        release:
          image: quay.io/openshift-release-dev/ocp-release:4.16.0-x86_64
        secretEncryption:
          aescbc:
            activeKey:
              name: key
          type: aescbc
        services:
        - service: APIServer
          servicePublishingStrategy:
            type: Route
            route: {}
        - service: OAuthServer
          servicePublishingStrategy:
            type: Route
            route: {}
        - service: Konnectivity
          servicePublishingStrategy:
            type: Route
            route: {}
        - service: Ignition
          servicePublishingStrategy:
            type: Route
            route: {}
    expected: |
      apiVersion: hypershift.openshift.io/v1beta1
      kind: HostedCluster
      spec:
        capabilities: {}
        controllerAvailabilityPolicy: HighlyAvailable
        dns:
          baseDomain: example.com
          baseDomainPrefix: '@invalid-prefix'
        etcd:
          managed:
            storage:
              persistentVolume:
                size: 8Gi
              type: PersistentVolume
          managementType: Managed
        infrastructureAvailabilityPolicy: SingleReplica
        issuerURL: https://kubernetes.default.svc
        networking:
          clusterNetwork:
          - cidr: 10.132.0.0/14
          networkType: OVNKubernetes
          serviceNetwork:
          - cidr: 172.31.0.0/16
        olmCatalogPlacement: management
        platform:
          type: AWS
        pullSecret:
          name: secret
        release:
          image: quay.io/openshift-release-dev/ocp-release:4.16.0-x86_64
        secretEncryption:
          aescbc:
            activeKey:
              name: key
          type: aescbc
        services:
        - service: APIServer
          servicePublishingStrategy:
            route: {}
            type: Route
        - service: OAuthServer
          servicePublishingStrategy:
            route: {}
            type: Route
        - service: Konnectivity
          servicePublishingStrategy:
            route: {}
            type: Route
        - service: Ignition
          servicePublishingStrategy:
            route: {}
            type: Route