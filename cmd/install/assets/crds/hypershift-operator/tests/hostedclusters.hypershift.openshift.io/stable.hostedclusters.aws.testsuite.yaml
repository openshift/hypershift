apiVersion: apiextensions.k8s.io/v1
name: "HostedCluster AWS validation"
crdName: hostedclusters.hypershift.openshift.io
version: v1beta1
tests:
  onCreate:
  - name: When ingressDNSManagement is Managed it should pass
    initial: |
      apiVersion: hypershift.openshift.io/v1beta1
      kind: HostedCluster
      spec:
        dns:
          baseDomain: example.com
        platform:
          type: AWS
          aws:
            region: us-east-1
            ingressDNSManagement: Managed
        pullSecret:
          name: secret
        release:
          image: quay.io/openshift-release-dev/ocp-release:4.15.11-x86_64
        secretEncryption:
          aescbc:
            activeKey:
              name: key
          type: aescbc
        services:
        - service: APIServer
          servicePublishingStrategy:
            type: Route
            route: {}
        - service: OAuthServer
          servicePublishingStrategy:
            type: Route
            route: {}
        - service: Konnectivity
          servicePublishingStrategy:
            type: Route
            route: {}
        - service: Ignition
          servicePublishingStrategy:
            type: Route
            route: {}

  - name: When ingressDNSManagement is Unmanaged it should pass
    initial: |
      apiVersion: hypershift.openshift.io/v1beta1
      kind: HostedCluster
