              kubeCloudControllerARN: arn:aws:iam::123456789012:role/kube
              networkARN: arn:aws:iam::123456789012:role/net
              nodePoolManagementARN: arn:aws:iam::123456789012:role/np
              storageARN: arn:aws:iam::123456789012:role/storage
            resourceTags:
            - key: "env"
              value: "production"
            - key: "team"
              value: "platform"
        pullSecret:
          name: secret
        release:
          image: quay.io/openshift-release-dev/ocp-release:4.17.0-rc.0-x86_64
        secretEncryption:
          aescbc:
            activeKey:
              name: key
          type: aescbc
        services:
        - service: APIServer
          servicePublishingStrategy:
            type: Route
            route: {}
        - service: OAuthServer
          servicePublishingStrategy:
            type: Route
            route: {}
        - service: Konnectivity
          servicePublishingStrategy:
            type: Route
            route: {}
        - service: Ignition
          servicePublishingStrategy:
            type: Route
            route: {}

