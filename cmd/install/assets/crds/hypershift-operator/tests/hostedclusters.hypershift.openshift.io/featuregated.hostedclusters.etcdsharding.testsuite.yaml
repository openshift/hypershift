apiVersion: apiextensions.k8s.io/v1
name: "HostedCluster etcd sharding validation"
crdName: hostedclusters.hypershift.openshift.io
featureGates:
  - EtcdSharding
version: v1beta1
tests:
  onUpdate:
  - name: When managed shards size changes it should fail
    initial: |
      apiVersion: hypershift.openshift.io/v1beta1
      kind: HostedCluster
      spec:
        dns:
          baseDomain: example.com
        etcd:
          managementType: Managed
          managed:
            storage:
              type: PersistentVolume
              persistentVolume:
                size: 8Gi
            shards:
            - name: events
              replicas: 1
              resources:
              - apiGroup: ""
                resource: events
              storage:
                type: EmptyDir
        platform:
          type: AWS
        pullSecret:
          name: secret
        release:
          image: quay.io/openshift-release-dev/ocp-release:4.15.11-x86_64
        secretEncryption:
          aescbc:
            activeKey:
              name: key
          type: aescbc
        services:
        - service: APIServer
          servicePublishingStrategy:
            type: Route
            route: {}
        - service: OAuthServer
          servicePublishingStrategy:
            type: Route
            route: {}
        - service: Konnectivity
          servicePublishingStrategy:
            type: Route
            route: {}
        - service: Ignition
          servicePublishingStrategy:
            type: Route
            route: {}
    updated: |
      apiVersion: hypershift.openshift.io/v1beta1
      kind: HostedCluster
      spec:
        dns:
          baseDomain: example.com
        etcd:
          managementType: Managed
          managed:
            storage:
              type: PersistentVolume
              persistentVolume:
                size: 8Gi
            shards:
            - name: events
              replicas: 1
              resources:
              - apiGroup: ""
                resource: events
              storage:
                type: EmptyDir
            - name: leases
              replicas: 1
              resources:
              - apiGroup: coordination.k8s.io
                resource: leases
              storage:
                type: EmptyDir
        platform:
          type: AWS
        pullSecret:
          name: secret
        release:
          image: quay.io/openshift-release-dev/ocp-release:4.15.11-x86_64
        secretEncryption:
          aescbc:
            activeKey:
              name: key
          type: aescbc
        services:
        - service: APIServer
          servicePublishingStrategy:
            type: Route
            route: {}
        - service: OAuthServer
          servicePublishingStrategy:
            type: Route
            route: {}
        - service: Konnectivity
          servicePublishingStrategy:
            type: Route
            route: {}
        - service: Ignition
          servicePublishingStrategy:
            type: Route
            route: {}
    expectedError: "shards cannot be added or removed after creation"

  - name: When managed shard name is replaced it should fail
    initial: |
      apiVersion: hypershift.openshift.io/v1beta1
      kind: HostedCluster
      spec:
        dns:
          baseDomain: example.com
        etcd:
          managementType: Managed
          managed:
            storage:
              type: PersistentVolume
              persistentVolume:
                size: 8Gi
            shards:
            - name: events
              replicas: 1
              resources:
              - apiGroup: ""
                resource: events
              storage:
                type: EmptyDir
        platform:
          type: AWS
        pullSecret:
          name: secret
        release:
          image: quay.io/openshift-release-dev/ocp-release:4.15.11-x86_64
        secretEncryption:
          aescbc:
            activeKey:
              name: key
          type: aescbc
        services:
        - service: APIServer
          servicePublishingStrategy:
            type: Route
            route: {}
        - service: OAuthServer
          servicePublishingStrategy:
            type: Route
            route: {}
        - service: Konnectivity
          servicePublishingStrategy:
            type: Route
            route: {}
        - service: Ignition
          servicePublishingStrategy:
            type: Route
            route: {}
    updated: |
      apiVersion: hypershift.openshift.io/v1beta1
      kind: HostedCluster
      spec:
        dns:
          baseDomain: example.com
        etcd:
          managementType: Managed
          managed:
            storage:
              type: PersistentVolume
              persistentVolume:
                size: 8Gi
            shards:
            - name: leases
              replicas: 1
              resources:
              - apiGroup: coordination.k8s.io
                resource: leases
              storage:
                type: EmptyDir
        platform:
          type: AWS
        pullSecret:
          name: secret
        release:
          image: quay.io/openshift-release-dev/ocp-release:4.15.11-x86_64
        secretEncryption:
          aescbc:
            activeKey:
              name: key
          type: aescbc
        services:
        - service: APIServer
          servicePublishingStrategy:
            type: Route
            route: {}
        - service: OAuthServer
          servicePublishingStrategy:
            type: Route
            route: {}
        - service: Konnectivity
          servicePublishingStrategy:
            type: Route
            route: {}
        - service: Ignition
          servicePublishingStrategy:
            type: Route
            route: {}
    expectedError: "existing shards cannot be replaced"

  - name: When managed shards are unchanged it should pass
    initial: |
      apiVersion: hypershift.openshift.io/v1beta1
      kind: HostedCluster
      spec:
        dns:
          baseDomain: example.com
        etcd:
          managementType: Managed
          managed:
            storage:
              type: PersistentVolume
              persistentVolume:
                size: 8Gi
            shards:
            - name: events
              replicas: 1
              resources:
              - apiGroup: ""
                resource: events
              storage:
                type: EmptyDir
        platform:
          type: AWS
        pullSecret:
          name: secret
        release:
          image: quay.io/openshift-release-dev/ocp-release:4.15.11-x86_64
        secretEncryption:
          aescbc:
            activeKey:
              name: key
          type: aescbc
        services:
        - service: APIServer
          servicePublishingStrategy:
            type: Route
            route: {}
        - service: OAuthServer
          servicePublishingStrategy:
            type: Route
            route: {}
        - service: Konnectivity
          servicePublishingStrategy:
            type: Route
            route: {}
        - service: Ignition
          servicePublishingStrategy:
            type: Route
            route: {}
    updated: |
      apiVersion: hypershift.openshift.io/v1beta1
      kind: HostedCluster
      spec:
        dns:
          baseDomain: example.com
        etcd:
          managementType: Managed
          managed:
            storage:
              type: PersistentVolume
              persistentVolume:
                size: 8Gi
            shards:
            - name: events
              replicas: 1
              resources:
              - apiGroup: ""
                resource: events
              storage:
                type: EmptyDir
        platform:
          type: AWS
        pullSecret:
          name: secret
        release:
          image: quay.io/openshift-release-dev/ocp-release:4.15.11-x86_64
        secretEncryption:
          aescbc:
            activeKey:
              name: key
          type: aescbc
        services:
        - service: APIServer
          servicePublishingStrategy:
            type: Route
            route: {}
        - service: OAuthServer
          servicePublishingStrategy:
            type: Route
            route: {}
        - service: Konnectivity
          servicePublishingStrategy:
            type: Route
            route: {}
        - service: Ignition
          servicePublishingStrategy:
            type: Route
            route: {}
    expected: |
      apiVersion: hypershift.openshift.io/v1beta1
      kind: HostedCluster
      spec:
        capabilities: {}
        controllerAvailabilityPolicy: HighlyAvailable
        dns:
          baseDomain: example.com
        etcd:
          managementType: Managed
          managed:
            storage:
              type: PersistentVolume
              persistentVolume:
                size: 8Gi
            shards:
            - name: events
              replicas: 1
              resources:
              - apiGroup: ""
                resource: events
              storage:
                type: EmptyDir
        infrastructureAvailabilityPolicy: SingleReplica
        issuerURL: https://kubernetes.default.svc
        networking:
          clusterNetwork:
          - cidr: 10.132.0.0/14
          networkType: OVNKubernetes
          serviceNetwork:
          - cidr: 172.31.0.0/16
        olmCatalogPlacement: management
        platform:
          type: AWS
        pullSecret:
          name: secret
        release:
          image: quay.io/openshift-release-dev/ocp-release:4.15.11-x86_64
        secretEncryption:
          aescbc:
            activeKey:
              name: key
          type: aescbc
        services:
        - service: APIServer
          servicePublishingStrategy:
            route: {}
            type: Route
        - service: OAuthServer
          servicePublishingStrategy:
            route: {}
            type: Route
        - service: Konnectivity
          servicePublishingStrategy:
            route: {}
            type: Route
        - service: Ignition
          servicePublishingStrategy:
            route: {}
            type: Route

  onCreate:
  - name: When managed shards have overlapping resources it should fail
    initial: |
      apiVersion: hypershift.openshift.io/v1beta1
      kind: HostedCluster
      spec:
        dns:
          baseDomain: example.com
        etcd:
          managementType: Managed
          managed:
            storage:
              type: PersistentVolume
              persistentVolume:
                size: 8Gi
            shards:
            - name: shard-a
              replicas: 1
              resources:
              - apiGroup: ""
                resource: events
              storage:
                type: EmptyDir
            - name: shard-b
              replicas: 1
              resources:
              - apiGroup: ""
                resource: events
              storage:
                type: EmptyDir
        platform:
          type: AWS
        pullSecret:
          name: secret
        release:
          image: quay.io/openshift-release-dev/ocp-release:4.15.11-x86_64
        secretEncryption:
          aescbc:
            activeKey:
              name: key
          type: aescbc
        services:
        - service: APIServer
          servicePublishingStrategy:
            type: Route
            route: {}
        - service: OAuthServer
          servicePublishingStrategy:
            type: Route
            route: {}
        - service: Konnectivity
          servicePublishingStrategy:
            type: Route
            route: {}
        - service: Ignition
          servicePublishingStrategy:
            type: Route
            route: {}
    expectedError: "resources must not overlap across shards"

  - name: When managed shard name is invalid it should fail
    initial: |
      apiVersion: hypershift.openshift.io/v1beta1
      kind: HostedCluster
      spec:
        dns:
          baseDomain: example.com
        etcd:
          managementType: Managed
          managed:
            storage:
              type: PersistentVolume
              persistentVolume:
                size: 8Gi
            shards:
            - name: INVALID_NAME
              replicas: 1
              resources:
              - apiGroup: ""
                resource: events
              storage:
                type: EmptyDir
        platform:
          type: AWS
        pullSecret:
          name: secret
        release:
          image: quay.io/openshift-release-dev/ocp-release:4.15.11-x86_64
        secretEncryption:
          aescbc:
            activeKey:
              name: key
          type: aescbc
        services:
        - service: APIServer
          servicePublishingStrategy:
            type: Route
            route: {}
        - service: OAuthServer
          servicePublishingStrategy:
            type: Route
            route: {}
        - service: Konnectivity
          servicePublishingStrategy:
            type: Route
            route: {}
        - service: Ignition
          servicePublishingStrategy:
            type: Route
            route: {}
    expectedError: "name must be a valid DNS1123 label"
