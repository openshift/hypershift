apiVersion: apiextensions.k8s.io/v1
name: "HostedCluster GCP validation"
crdName: hostedclusters.hypershift.openshift.io
featureGates:
  - GCPPlatform
version: v1beta1
tests:
  onCreate:
  # --- GCP project/region validation ---
  - name: When GCP project ID has invalid format it should fail
    initial: |
      apiVersion: hypershift.openshift.io/v1beta1
      kind: HostedCluster
      spec:
        dns:
          baseDomain: example.com
        platform:
          type: GCP
          gcp:
            project: "My-Project"
            region: us-central1
            networkConfig:
              network:
                name: my-network
              privateServiceConnectSubnet:
                name: my-psc-subnet
            workloadIdentity:
              projectNumber: "123456789012"
              poolID: my-wif-pool
              providerID: my-wif-provider
              serviceAccountsEmails:
                nodePool: nodepool@my-project-123.iam.gserviceaccount.com
                controlPlane: controlplane@my-project-123.iam.gserviceaccount.com
                cloudController: cloudcontroller@my-project-123.iam.gserviceaccount.com
                storage: storage@my-project-123.iam.gserviceaccount.com
                imageRegistry: imageregistry@my-project-123.iam.gserviceaccount.com
                network: cnccsa@my-project-123.iam.gserviceaccount.com
        pullSecret:
          name: secret
        release:
          image: quay.io/openshift-release-dev/ocp-release:4.15.11-x86_64
        secretEncryption:
          aescbc:
            activeKey:
              name: key
          type: aescbc
        services:
        - service: APIServer
          servicePublishingStrategy:
            type: Route
            route: {}
        - service: OAuthServer
          servicePublishingStrategy:
            type: Route
            route: {}
        - service: Konnectivity
          servicePublishingStrategy:
            type: Route
            route: {}
        - service: Ignition
          servicePublishingStrategy:
            type: Route
            route: {}
    expectedError: "spec.platform.gcp.project"

