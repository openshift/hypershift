        - service: Ignition
          servicePublishingStrategy:
            type: Route
            route: {}
    expectedError: "ovnKubernetesConfig is forbidden when networkType is not OVNKubernetes"

  - name: When ovnKubernetesConfig is set and networkType is OVNKubernetes it should pass
