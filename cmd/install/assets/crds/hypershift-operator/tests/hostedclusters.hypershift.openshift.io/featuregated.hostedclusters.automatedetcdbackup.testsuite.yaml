apiVersion: apiextensions.k8s.io/v1
name: "HostedCluster automated etcd backup validation"
crdName: hostedclusters.hypershift.openshift.io
featureGates:
  - HCPAutomatedEtcdBackup
version: v1beta1
tests:
  onCreate:
  - name: When automatedBackup has valid GCS config it should pass
    initial: |
      apiVersion: hypershift.openshift.io/v1beta1
      kind: HostedCluster
      spec:
        dns:
          baseDomain: example.com
        etcd:
          managementType: Managed
          managed:
            storage:
              type: PersistentVolume
              persistentVolume:
                size: 8Gi
            automatedBackup:
              schedule: "0 * * * *"
              storage:
                type: GCS
                gcs:
                  bucket: my-backup-bucket
                  gcpServiceAccount: mysa12@my-project.iam.gserviceaccount.com
        platform:
          type: AWS
        pullSecret:
          name: secret
        release:
          image: quay.io/openshift-release-dev/ocp-release:4.15.11-x86_64
        secretEncryption:
          aescbc:
            activeKey:
              name: key
          type: aescbc
        services:
        - service: APIServer
          servicePublishingStrategy:
            type: Route
            route: {}
        - service: OAuthServer
          servicePublishingStrategy:
            type: Route
            route: {}
        - service: Konnectivity
          servicePublishingStrategy:
            type: Route
            route: {}
        - service: Ignition
          servicePublishingStrategy:
            type: Route
            route: {}

  - name: When schedule is not a 5-field cron expression it should fail
    initial: |
      apiVersion: hypershift.openshift.io/v1beta1
      kind: HostedCluster
      spec:
        dns:
          baseDomain: example.com
        etcd:
          managementType: Managed
          managed:
            storage:
              type: PersistentVolume
              persistentVolume:
                size: 8Gi
            automatedBackup:
              schedule: "every hour"
              storage:
                type: GCS
                gcs:
                  bucket: my-backup-bucket
                  gcpServiceAccount: mysa12@my-project.iam.gserviceaccount.com
        platform:
          type: AWS
        pullSecret:
          name: secret
        release:
          image: quay.io/openshift-release-dev/ocp-release:4.15.11-x86_64
        secretEncryption:
          aescbc:
            activeKey:
              name: key
          type: aescbc
        services:
        - service: APIServer
          servicePublishingStrategy:
            type: Route
            route: {}
        - service: OAuthServer
          servicePublishingStrategy:
            type: Route
            route: {}
        - service: Konnectivity
          servicePublishingStrategy:
            type: Route
            route: {}
        - service: Ignition
          servicePublishingStrategy:
            type: Route
            route: {}
    expectedError: "schedule must be a 5-field cron expression"

