apiVersion: apiextensions.k8s.io/v1
name: "HostedCluster operatorConfiguration log levels"
crdName: hostedclusters.hypershift.openshift.io
featureGates:
  - HCPUserFacingOperatorLogs
version: v1beta1
tests:
  onCreate:
  - name: When kubeAPIServer logLevel is Normal it should pass
    initial: |
      apiVersion: hypershift.openshift.io/v1beta1
      kind: HostedCluster
      spec:
        operatorConfiguration:
          kubeAPIServer:
            logLevel: Normal
        dns:
          baseDomain: example.com
        platform:
          type: AWS
        pullSecret:
          name: secret
        release:
          image: quay.io/openshift-release-dev/ocp-release:4.15.11-x86_64
        secretEncryption:
          aescbc:
            activeKey:
              name: key
          type: aescbc
        services:
        - service: APIServer
          servicePublishingStrategy:
            type: Route
            route: {}
        - service: OAuthServer
          servicePublishingStrategy:
            type: Route
            route: {}
        - service: Konnectivity
          servicePublishingStrategy:
            type: Route
            route: {}
        - service: Ignition
          servicePublishingStrategy:
            type: Route
            route: {}

  - name: When kubeAPIServer logLevel is Debug it should pass
