apiVersion: apiextensions.k8s.io/v1
name: "HostedCluster etcd backup status validation"
crdName: hostedclusters.hypershift.openshift.io
featureGates:
  - HCPEtcdBackup
version: v1beta1
tests:
  onUpdate:
  - name: When lastSuccessfulEtcdBackupURL has invalid scheme it should fail
    initial: |
      apiVersion: hypershift.openshift.io/v1beta1
      kind: HostedCluster
      spec:
        dns:
          baseDomain: example.com
        etcd:
          managementType: Managed
          managed:
            storage:
              type: PersistentVolume
              persistentVolume:
                size: 8Gi
        platform:
          type: AWS
        pullSecret:
          name: secret
        release:
          image: quay.io/openshift-release-dev/ocp-release:4.15.11-x86_64
        secretEncryption:
          aescbc:
            activeKey:
              name: key
          type: aescbc
        services:
        - service: APIServer
          servicePublishingStrategy:
            type: Route
            route: {}
        - service: OAuthServer
          servicePublishingStrategy:
            type: Route
            route: {}
        - service: Konnectivity
          servicePublishingStrategy:
            type: Route
            route: {}
        - service: Ignition
          servicePublishingStrategy:
            type: Route
            route: {}
    updated: |
      apiVersion: hypershift.openshift.io/v1beta1
      kind: HostedCluster
      spec:
        dns:
          baseDomain: example.com
        etcd:
          managementType: Managed
          managed:
            storage:
              type: PersistentVolume
              persistentVolume:
                size: 8Gi
        platform:
          type: AWS
        pullSecret:
          name: secret
        release:
          image: quay.io/openshift-release-dev/ocp-release:4.15.11-x86_64
        secretEncryption:
          aescbc:
            activeKey:
              name: key
          type: aescbc
        services:
        - service: APIServer
          servicePublishingStrategy:
            type: Route
            route: {}
        - service: OAuthServer
          servicePublishingStrategy:
            type: Route
            route: {}
        - service: Konnectivity
          servicePublishingStrategy:
            type: Route
            route: {}
        - service: Ignition
          servicePublishingStrategy:
            type: Route
            route: {}
      status:
        lastSuccessfulEtcdBackupURL: "http://bucket.example.com/snapshot.db"
    expectedStatusError: "lastSuccessfulEtcdBackupURL must be a valid URL with scheme https or s3"

  - name: When lastSuccessfulEtcdBackupURL has https scheme it should pass
    initial: |
      apiVersion: hypershift.openshift.io/v1beta1
      kind: HostedCluster
      spec:
        dns:
          baseDomain: example.com
        etcd:
          managementType: Managed
          managed:
            storage:
              type: PersistentVolume
              persistentVolume:
                size: 8Gi
        platform:
          type: AWS
        pullSecret:
          name: secret
        release:
          image: quay.io/openshift-release-dev/ocp-release:4.15.11-x86_64
        secretEncryption:
          aescbc:
            activeKey:
              name: key
          type: aescbc
        services:
        - service: APIServer
          servicePublishingStrategy:
            type: Route
            route: {}
        - service: OAuthServer
          servicePublishingStrategy:
            type: Route
            route: {}
        - service: Konnectivity
          servicePublishingStrategy:
            type: Route
            route: {}
        - service: Ignition
          servicePublishingStrategy:
            type: Route
            route: {}
    updated: |
      apiVersion: hypershift.openshift.io/v1beta1
      kind: HostedCluster
      spec:
        dns:
          baseDomain: example.com
        etcd:
          managementType: Managed
          managed:
            storage:
              type: PersistentVolume
              persistentVolume:
                size: 8Gi
        platform:
          type: AWS
        pullSecret:
          name: secret
        release:
          image: quay.io/openshift-release-dev/ocp-release:4.15.11-x86_64
        secretEncryption:
          aescbc:
            activeKey:
              name: key
          type: aescbc
        services:
        - service: APIServer
          servicePublishingStrategy:
            type: Route
            route: {}
        - service: OAuthServer
          servicePublishingStrategy:
            type: Route
            route: {}
        - service: Konnectivity
          servicePublishingStrategy:
            type: Route
            route: {}
        - service: Ignition
          servicePublishingStrategy:
            type: Route
            route: {}
      status:
        lastSuccessfulEtcdBackupURL: "https://bucket.s3.amazonaws.com/snapshot.db"
    expected: |
      apiVersion: hypershift.openshift.io/v1beta1
      kind: HostedCluster
      spec:
        capabilities: {}
        controllerAvailabilityPolicy: HighlyAvailable
        dns:
          baseDomain: example.com
        etcd:
          managed:
            storage:
              persistentVolume:
                size: 8Gi
              type: PersistentVolume
          managementType: Managed
        infrastructureAvailabilityPolicy: SingleReplica
        issuerURL: https://kubernetes.default.svc
        networking:
          clusterNetwork:
          - cidr: 10.132.0.0/14
          networkType: OVNKubernetes
          serviceNetwork:
          - cidr: 172.31.0.0/16
        olmCatalogPlacement: management
        platform:
          type: AWS
        pullSecret:
          name: secret
        release:
          image: quay.io/openshift-release-dev/ocp-release:4.15.11-x86_64
        secretEncryption:
          aescbc:
            activeKey:
              name: key
          type: aescbc
        services:
        - service: APIServer
          servicePublishingStrategy:
            route: {}
            type: Route
        - service: OAuthServer
          servicePublishingStrategy:
            route: {}
            type: Route
        - service: Konnectivity
          servicePublishingStrategy:
            route: {}
            type: Route
        - service: Ignition
          servicePublishingStrategy:
            route: {}
            type: Route
      status:
        lastSuccessfulEtcdBackupURL: https://bucket.s3.amazonaws.com/snapshot.db
  - name: When lastSuccessfulEtcdBackupURL has s3 scheme it should pass
    initial: |
      apiVersion: hypershift.openshift.io/v1beta1
      kind: HostedCluster
      spec:
        dns:
          baseDomain: example.com
        etcd:
          managementType: Managed
          managed:
            storage:
              type: PersistentVolume
              persistentVolume:
                size: 8Gi
        platform:
          type: AWS
        pullSecret:
          name: secret
        release:
          image: quay.io/openshift-release-dev/ocp-release:4.15.11-x86_64
        secretEncryption:
          aescbc:
            activeKey:
              name: key
          type: aescbc
        services:
        - service: APIServer
          servicePublishingStrategy:
            type: Route
            route: {}
        - service: OAuthServer
          servicePublishingStrategy:
            type: Route
            route: {}
        - service: Konnectivity
          servicePublishingStrategy:
            type: Route
            route: {}
        - service: Ignition
          servicePublishingStrategy:
            type: Route
            route: {}
    updated: |
      apiVersion: hypershift.openshift.io/v1beta1
      kind: HostedCluster
      spec:
        dns:
          baseDomain: example.com
        etcd:
          managementType: Managed
          managed:
            storage:
              type: PersistentVolume
              persistentVolume:
                size: 8Gi
        platform:
          type: AWS
        pullSecret:
          name: secret
        release:
          image: quay.io/openshift-release-dev/ocp-release:4.15.11-x86_64
        secretEncryption:
          aescbc:
            activeKey:
              name: key
          type: aescbc
        services:
        - service: APIServer
          servicePublishingStrategy:
            type: Route
            route: {}
        - service: OAuthServer
          servicePublishingStrategy:
            type: Route
            route: {}
        - service: Konnectivity
          servicePublishingStrategy:
            type: Route
            route: {}
        - service: Ignition
          servicePublishingStrategy:
            type: Route
            route: {}
      status:
        lastSuccessfulEtcdBackupURL: "s3://bucket/snapshot.db"
    expected: |
      apiVersion: hypershift.openshift.io/v1beta1
      kind: HostedCluster
      spec:
        capabilities: {}
        controllerAvailabilityPolicy: HighlyAvailable
        dns:
          baseDomain: example.com
        etcd:
          managed:
            storage:
              persistentVolume:
                size: 8Gi
              type: PersistentVolume
          managementType: Managed
        infrastructureAvailabilityPolicy: SingleReplica
        issuerURL: https://kubernetes.default.svc
        networking:
          clusterNetwork:
          - cidr: 10.132.0.0/14
          networkType: OVNKubernetes
          serviceNetwork:
          - cidr: 172.31.0.0/16
        olmCatalogPlacement: management
        platform:
          type: AWS
        pullSecret:
          name: secret
        release:
          image: quay.io/openshift-release-dev/ocp-release:4.15.11-x86_64
        secretEncryption:
          aescbc:
            activeKey:
              name: key
          type: aescbc
        services:
        - service: APIServer
          servicePublishingStrategy:
            route: {}
            type: Route
        - service: OAuthServer
          servicePublishingStrategy:
            route: {}
            type: Route
        - service: Konnectivity
          servicePublishingStrategy:
            route: {}
            type: Route
        - service: Ignition
          servicePublishingStrategy:
            route: {}
            type: Route
      status:
        lastSuccessfulEtcdBackupURL: s3://bucket/snapshot.db