apiVersion: apiextensions.k8s.io/v1
name: "HostedCluster AutoNode/Karpenter validation"
crdName: hostedclusters.hypershift.openshift.io
version: v1beta1
tests:
  onCreate:
  # --- ProvisionerConfig union validation ---
  - name: When autoNode provisioner name is Karpenter without karpenter config it should fail
    initial: |
      apiVersion: hypershift.openshift.io/v1beta1
      kind: HostedCluster
      spec:
        autoNode:
          provisionerConfig:
            name: Karpenter
        dns:
          baseDomain: example.com
        platform:
          type: AWS
        pullSecret:
          name: secret
        release:
          image: quay.io/openshift-release-dev/ocp-release:4.15.11-x86_64
        secretEncryption:
          aescbc:
            activeKey:
              name: key
          type: aescbc
        services:
        - service: APIServer
          servicePublishingStrategy:
            type: Route
            route: {}
        - service: OAuthServer
          servicePublishingStrategy:
            type: Route
            route: {}
        - service: Konnectivity
          servicePublishingStrategy:
            type: Route
            route: {}
        - service: Ignition
          servicePublishingStrategy:
            type: Route
            route: {}
    expectedError: "karpenter is required when name is Karpenter, and forbidden otherwise"

  - name: When autoNode provisioner name is Karpenter with karpenter config it should pass
    initial: |
      apiVersion: hypershift.openshift.io/v1beta1
      kind: HostedCluster
      spec:
        autoNode:
          provisionerConfig:
            name: Karpenter
            karpenter:
              platform: AWS
              aws:
                roleARN: "arn:aws:iam::123456789012:role/MyRole"
        dns:
          baseDomain: example.com
        platform:
          type: AWS
        pullSecret:
          name: secret
        release:
          image: quay.io/openshift-release-dev/ocp-release:4.15.11-x86_64
        secretEncryption:
          aescbc:
            activeKey:
              name: key
          type: aescbc
        services:
        - service: APIServer
          servicePublishingStrategy:
            type: Route
            route: {}
        - service: OAuthServer
          servicePublishingStrategy:
            type: Route
            route: {}
        - service: Konnectivity
          servicePublishingStrategy:
            type: Route
            route: {}
        - service: Ignition
          servicePublishingStrategy:
            type: Route
            route: {}

  # --- KarpenterConfig union validation ---
  - name: When karpenter platform is AWS without aws config it should fail
    initial: |
      apiVersion: hypershift.openshift.io/v1beta1
      kind: HostedCluster
      spec:
        autoNode:
          provisionerConfig:
            name: Karpenter
            karpenter:
              platform: AWS
        dns:
          baseDomain: example.com
        platform:
          type: AWS
        pullSecret:
          name: secret
        release:
          image: quay.io/openshift-release-dev/ocp-release:4.15.11-x86_64
        secretEncryption:
          aescbc:
            activeKey:
              name: key
          type: aescbc
        services:
        - service: APIServer
          servicePublishingStrategy:
            type: Route
            route: {}
        - service: OAuthServer
          servicePublishingStrategy:
            type: Route
            route: {}
        - service: Konnectivity
          servicePublishingStrategy:
            type: Route
            route: {}
        - service: Ignition
          servicePublishingStrategy:
            type: Route
            route: {}
    expectedError: "aws is required when platform is AWS, and forbidden otherwise"

  # --- Provisioner name enum validation ---
  - name: When autoNode provisioner name is invalid it should fail
    initial: |
      apiVersion: hypershift.openshift.io/v1beta1
      kind: HostedCluster
      spec:
        autoNode:
          provisionerConfig:
            name: InvalidProvisioner
        dns:
          baseDomain: example.com
        platform:
          type: AWS
        pullSecret:
          name: secret
        release:
          image: quay.io/openshift-release-dev/ocp-release:4.15.11-x86_64
        secretEncryption:
          aescbc:
            activeKey:
              name: key
          type: aescbc
        services:
        - service: APIServer
          servicePublishingStrategy:
            type: Route
            route: {}
        - service: OAuthServer
          servicePublishingStrategy:
            type: Route
            route: {}
        - service: Konnectivity
          servicePublishingStrategy:
            type: Route
            route: {}
        - service: Ignition
          servicePublishingStrategy:
            type: Route
            route: {}
    expectedError: "Unsupported value"

  # --- RoleARN validation ---
  - name: When karpenter AWS roleARN is invalid it should fail
    initial: |
      apiVersion: hypershift.openshift.io/v1beta1
      kind: HostedCluster
      spec:
        autoNode:
          provisionerConfig:
            name: Karpenter
            karpenter:
              platform: AWS
              aws:
                roleARN: "not-a-valid-arn"
        dns:
          baseDomain: example.com
        platform:
          type: AWS
        pullSecret:
          name: secret
        release:
          image: quay.io/openshift-release-dev/ocp-release:4.15.11-x86_64
        secretEncryption:
          aescbc:
            activeKey:
              name: key
          type: aescbc
        services:
        - service: APIServer
          servicePublishingStrategy:
            type: Route
            route: {}
        - service: OAuthServer
          servicePublishingStrategy:
            type: Route
            route: {}
        - service: Konnectivity
          servicePublishingStrategy:
            type: Route
            route: {}
        - service: Ignition
          servicePublishingStrategy:
            type: Route
            route: {}
    expectedError: "roleARN must be a valid AWS IAM role ARN"

  - name: When karpenter AWS roleARN is valid it should pass
    initial: |
      apiVersion: hypershift.openshift.io/v1beta1
      kind: HostedCluster
      spec:
        autoNode:
          provisionerConfig:
            name: Karpenter
            karpenter:
              platform: AWS
              aws:
                roleARN: "arn:aws:iam::123456789012:role/KarpenterNodeRole"
        dns:
          baseDomain: example.com
        platform:
          type: AWS
        pullSecret:
          name: secret
        release:
          image: quay.io/openshift-release-dev/ocp-release:4.15.11-x86_64
        secretEncryption:
          aescbc:
            activeKey:
              name: key
          type: aescbc
        services:
        - service: APIServer
          servicePublishingStrategy:
            type: Route
            route: {}
        - service: OAuthServer
          servicePublishingStrategy:
            type: Route
            route: {}
        - service: Konnectivity
          servicePublishingStrategy:
            type: Route
            route: {}
        - service: Ignition
          servicePublishingStrategy:
            type: Route
            route: {}
