apiVersion: apiextensions.k8s.io/v1
name: "HCPEtcdBackup status validation"
crdName: hcpetcdbackups.hypershift.openshift.io
featureGates:
  - HCPEtcdBackup
version: v1beta1
tests:
  onUpdate:
  # --- snapshotURL validation ---
  - name: When snapshotURL has invalid scheme it should fail
    initial: |
      apiVersion: hypershift.openshift.io/v1beta1
      kind: HCPEtcdBackup
      spec:
        storage:
          storageType: S3
          s3:
            bucket: my-backup-bucket
            region: us-east-1
            keyPrefix: backups/etcd
            credentials:
              name: aws-credentials
    updated: |
      apiVersion: hypershift.openshift.io/v1beta1
      kind: HCPEtcdBackup
      spec:
        storage:
          storageType: S3
          s3:
            bucket: my-backup-bucket
            region: us-east-1
            keyPrefix: backups/etcd
            credentials:
              name: aws-credentials
      status:
        snapshotURL: "http://bucket.s3.amazonaws.com/snapshot.db"
        conditions:
        - type: BackupCompleted
          status: "True"
          reason: BackupSucceeded
          message: Backup completed
          lastTransitionTime: "2024-01-01T00:00:00Z"
    expectedStatusError: "snapshotURL must be a valid URL with scheme https or s3"

  - name: When snapshotURL has valid https scheme it should pass
    initial: |
      apiVersion: hypershift.openshift.io/v1beta1
      kind: HCPEtcdBackup
      spec:
        storage:
          storageType: S3
          s3:
            bucket: my-backup-bucket
            region: us-east-1
            keyPrefix: backups/etcd
            credentials:
              name: aws-credentials
    updated: |
      apiVersion: hypershift.openshift.io/v1beta1
      kind: HCPEtcdBackup
      spec:
        storage:
          storageType: S3
          s3:
            bucket: my-backup-bucket
            region: us-east-1
            keyPrefix: backups/etcd
            credentials:
              name: aws-credentials
      status:
        snapshotURL: "https://bucket.s3.amazonaws.com/snapshot.db"
        conditions:
        - type: BackupCompleted
          status: "True"
          reason: BackupSucceeded
          message: Backup completed
          lastTransitionTime: "2024-01-01T00:00:00Z"

  - name: When snapshotURL has valid s3 scheme it should pass
    initial: |
      apiVersion: hypershift.openshift.io/v1beta1
      kind: HCPEtcdBackup
      spec:
        storage:
          storageType: S3
          s3:
            bucket: my-backup-bucket
            region: us-east-1
            keyPrefix: backups/etcd
            credentials:
              name: aws-credentials
    updated: |
      apiVersion: hypershift.openshift.io/v1beta1
      kind: HCPEtcdBackup
      spec:
        storage:
          storageType: S3
          s3:
            bucket: my-backup-bucket
            region: us-east-1
            keyPrefix: backups/etcd
            credentials:
              name: aws-credentials
      status:
        snapshotURL: "s3://my-backup-bucket/backups/etcd/snapshot.db"
        conditions:
        - type: BackupCompleted
          status: "True"
          reason: BackupSucceeded
          message: Backup completed
          lastTransitionTime: "2024-01-01T00:00:00Z"

  # --- encryptionMetadata validation ---
  - name: When encryptionMetadata has both aws and azure it should fail
    initial: |
      apiVersion: hypershift.openshift.io/v1beta1
      kind: HCPEtcdBackup
      spec:
        storage:
          storageType: S3
          s3:
            bucket: my-backup-bucket
            region: us-east-1
            keyPrefix: backups/etcd
            credentials:
              name: aws-credentials
    updated: |
      apiVersion: hypershift.openshift.io/v1beta1
      kind: HCPEtcdBackup
      spec:
        storage:
          storageType: S3
          s3:
            bucket: my-backup-bucket
            region: us-east-1
            keyPrefix: backups/etcd
            credentials:
              name: aws-credentials
      status:
        conditions:
        - type: BackupCompleted
          status: "True"
          reason: BackupSucceeded
          message: Backup completed
          lastTransitionTime: "2024-01-01T00:00:00Z"
        encryptionMetadata:
          aws:
            kmsKeyARN: "arn:aws:kms:us-east-1:123456789012:key/12345678-1234-1234-1234-123456789012"
          azure:
            encryptionKeyURL: "https://my-vault.vault.azure.net/keys/my-key/abc123"
    expectedStatusError: "must have at most 1 item"

  - name: When encryptionMetadata is empty it should fail
    initial: |
      apiVersion: hypershift.openshift.io/v1beta1
      kind: HCPEtcdBackup
      spec:
        storage:
          storageType: S3
          s3:
            bucket: my-backup-bucket
            region: us-east-1
            keyPrefix: backups/etcd
            credentials:
              name: aws-credentials
    updated: |
      apiVersion: hypershift.openshift.io/v1beta1
      kind: HCPEtcdBackup
      spec:
        storage:
          storageType: S3
          s3:
            bucket: my-backup-bucket
            region: us-east-1
            keyPrefix: backups/etcd
            credentials:
              name: aws-credentials
      status:
        conditions:
        - type: BackupCompleted
          status: "True"
          reason: BackupSucceeded
          message: Backup completed
          lastTransitionTime: "2024-01-01T00:00:00Z"
        encryptionMetadata: {}
    expectedStatusError: "should have at least 1 properties"

  - name: When encryptionMetadata has only aws it should pass
    initial: |
      apiVersion: hypershift.openshift.io/v1beta1
      kind: HCPEtcdBackup
      spec:
        storage:
          storageType: S3
          s3:
            bucket: my-backup-bucket
            region: us-east-1
            keyPrefix: backups/etcd
            credentials:
              name: aws-credentials
    updated: |
      apiVersion: hypershift.openshift.io/v1beta1
      kind: HCPEtcdBackup
      spec:
        storage:
          storageType: S3
          s3:
            bucket: my-backup-bucket
            region: us-east-1
            keyPrefix: backups/etcd
            credentials:
              name: aws-credentials
      status:
        conditions:
        - type: BackupCompleted
          status: "True"
          reason: BackupSucceeded
          message: Backup completed
          lastTransitionTime: "2024-01-01T00:00:00Z"
        encryptionMetadata:
          aws:
            kmsKeyARN: "arn:aws:kms:us-east-1:123456789012:key/12345678-1234-1234-1234-123456789012"

  - name: When encryptionMetadata has only azure it should pass
    initial: |
      apiVersion: hypershift.openshift.io/v1beta1
      kind: HCPEtcdBackup
      spec:
        storage:
          storageType: AzureBlob
          azureBlob:
            container: my-backup-container
            storageAccount: mystorageaccount
            keyPrefix: backups/etcd
            credentials:
              name: azure-credentials
    updated: |
      apiVersion: hypershift.openshift.io/v1beta1
      kind: HCPEtcdBackup
      spec:
        storage:
          storageType: AzureBlob
          azureBlob:
            container: my-backup-container
            storageAccount: mystorageaccount
            keyPrefix: backups/etcd
            credentials:
              name: azure-credentials
      status:
        conditions:
        - type: BackupCompleted
          status: "True"
          reason: BackupSucceeded
          message: Backup completed
          lastTransitionTime: "2024-01-01T00:00:00Z"
        encryptionMetadata:
          azure:
            encryptionKeyURL: "https://my-vault.vault.azure.net/keys/my-key/abc123"

  # --- encryptionMetadata field format validation ---
  - name: When encryptionMetadata aws kmsKeyARN has invalid format it should fail
    initial: |
      apiVersion: hypershift.openshift.io/v1beta1
      kind: HCPEtcdBackup
      spec:
        storage:
          storageType: S3
          s3:
            bucket: my-backup-bucket
            region: us-east-1
            keyPrefix: backups/etcd
            credentials:
              name: aws-credentials
    updated: |
      apiVersion: hypershift.openshift.io/v1beta1
      kind: HCPEtcdBackup
      spec:
        storage:
          storageType: S3
          s3:
            bucket: my-backup-bucket
            region: us-east-1
            keyPrefix: backups/etcd
            credentials:
              name: aws-credentials
      status:
        conditions:
        - type: BackupCompleted
          status: "True"
          reason: BackupSucceeded
          message: Backup completed
          lastTransitionTime: "2024-01-01T00:00:00Z"
        encryptionMetadata:
          aws:
            kmsKeyARN: "not-a-valid-arn"
    expectedStatusError: "kmsKeyARN must be a valid AWS KMS key ARN"

  - name: When encryptionMetadata azure encryptionKeyURL has invalid format it should fail
    initial: |
      apiVersion: hypershift.openshift.io/v1beta1
      kind: HCPEtcdBackup
      spec:
        storage:
          storageType: AzureBlob
          azureBlob:
            container: my-backup-container
            storageAccount: mystorageaccount
            keyPrefix: backups/etcd
            credentials:
              name: azure-credentials
    updated: |
      apiVersion: hypershift.openshift.io/v1beta1
      kind: HCPEtcdBackup
      spec:
        storage:
          storageType: AzureBlob
          azureBlob:
            container: my-backup-container
            storageAccount: mystorageaccount
            keyPrefix: backups/etcd
            credentials:
              name: azure-credentials
      status:
        conditions:
        - type: BackupCompleted
          status: "True"
          reason: BackupSucceeded
          message: Backup completed
          lastTransitionTime: "2024-01-01T00:00:00Z"
        encryptionMetadata:
          azure:
            encryptionKeyURL: "not-a-valid-url"
    expectedStatusError: "encryptionKeyURL must be a valid Azure Key Vault HTTPS URL"
