          test7: test7
          test8: test8
          test9: test9
          test10: test10
          test11: test11
          test12: test12
          test13: test13
          test14: test14
          test15: test15
          test16: test16
          test17: test17
          test18: test18
          test19: test19
          test20: test20
          test21: test21
          test22: test22
          test23: test23
          test24: test24
        dns:
          baseDomain: example.com
        platform:
          type: AWS
        pullSecret:
          name: secret
        release:
          image: quay.io/openshift-release-dev/ocp-release:4.15.11-x86_64
        secretEncryption:
          aescbc:
            activeKey:
              name: key
          type: aescbc
        services:
        - service: APIServer
          servicePublishingStrategy:
            type: Route
            route: {}
        - service: OAuthServer
