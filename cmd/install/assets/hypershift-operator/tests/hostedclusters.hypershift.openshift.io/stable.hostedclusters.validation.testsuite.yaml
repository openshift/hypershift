        - service: Konnectivity
          servicePublishingStrategy:
            type: Route
            route: {}
        - service: Ignition
          servicePublishingStrategy:
            type: Route
            route: {}
    expectedError: 'Unsupported value: "foo": supported values: "HighlyAvailable", "SingleReplica"'

  - name: When infrastructureAvailabilityPolicy is invalid it should fail
