  # --- AvailabilityPolicy validation ---
  - name: When controllerAvailabilityPolicy is invalid it should fail
    initial: |
      apiVersion: hypershift.openshift.io/v1beta1
      kind: HostedCluster
      spec:
        controllerAvailabilityPolicy: "foo"
        dns:
          baseDomain: example.com
        platform:
