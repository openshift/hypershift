apiVersion: apiextensions.k8s.io/v1
name: "NodePool AWS validation"
crdName: nodepools.hypershift.openshift.io
version: v1beta1
tests:
  onCreate:
  # --- AWS Placement / Capacity Reservation validation ---
  - name: when tenancy is host and capacity reservation is specified it should fail
    initial: |
      apiVersion: hypershift.openshift.io/v1beta1
      kind: NodePool
      spec:
        arch: amd64
        clusterName: some-cluster
        management:
          autoRepair: false
          upgradeType: Replace
        release:
          image: quay.io/openshift-release-dev/ocp-release:4.17.0-rc.0-x86_64
        replicas: 0
        platform:
          aws:
            instanceProfile: a-profile
            instanceType: m6a.2xlarge
            rootVolume:
              size: 120
              type: gp3
            subnet:
              id: "subnet-any"
            placement:
              tenancy: host
              capacityReservation:
                id: "cr-1234567890abcdef0"
          type: AWS
    expectedError: "AWS Capacity Reservations cannot be used with Dedicated Hosts (tenancy 'host')"

  - name: when capacity reservation ID is specified with preference None it should fail
    initial: |
      apiVersion: hypershift.openshift.io/v1beta1
      kind: NodePool
      spec:
        arch: amd64
        clusterName: some-cluster
        management:
          autoRepair: false
          upgradeType: Replace
        release:
          image: quay.io/openshift-release-dev/ocp-release:4.17.0-rc.0-x86_64
        replicas: 0
        platform:
          aws:
            instanceProfile: a-profile
            instanceType: m6a.2xlarge
            rootVolume:
              size: 120
              type: gp3
            subnet:
              id: "subnet-any"
            placement:
              capacityReservation:
                id: "cr-1234567890abcdef0"
                preference: None
          type: AWS
    expectedError: "AWS Capacity Reservation preference 'None' or 'Open' is incompatible with specifying a Capacity Reservation ID"

  - name: when capacity reservation ID has invalid format it should fail
    initial: |
      apiVersion: hypershift.openshift.io/v1beta1
      kind: NodePool
      spec:
        arch: amd64
        clusterName: some-cluster
        management:
          autoRepair: false
          upgradeType: Replace
        release:
          image: quay.io/openshift-release-dev/ocp-release:4.17.0-rc.0-x86_64
        replicas: 0
        platform:
          aws:
            instanceProfile: a-profile
            instanceType: m6a.2xlarge
            rootVolume:
              size: 120
              type: gp3
            subnet:
              id: "subnet-any"
            placement:
              capacityReservation:
                id: "invalid-id"
          type: AWS
    expectedError: "AWS Capacity Reservation ID must start with 'cr-' followed by 17 lowercase hexadecimal characters"

  - name: when capacity reservation ID is specified with preference Open it should fail
