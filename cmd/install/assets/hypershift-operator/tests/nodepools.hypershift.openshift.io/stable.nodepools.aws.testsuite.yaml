  # --- Architecture validation ---
  - name: should fail for s390x arch on AWS platform
    initial: |
      apiVersion: hypershift.openshift.io/v1beta1
      kind: NodePool
      spec:
        arch: s390x
        clusterName: some-cluster
        management:
          autoRepair: false
          upgradeType: Replace
        release:
          image: quay.io/openshift-release-dev/ocp-release:4.17.0-rc.0-x86_64
        replicas: 0
        platform:
          aws:
            instanceProfile: a-profile
            instanceType: m6i.large
            rootVolume:
              size: 120
              type: gp3
            subnet:
              id: "subnet-any"
          type: AWS
    expectedError: "s390x is only supported on KubeVirt platform"

