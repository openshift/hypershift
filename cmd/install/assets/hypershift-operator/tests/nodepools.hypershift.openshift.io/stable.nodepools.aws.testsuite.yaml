                id: "cr-1234567890abcdef0"
                preference: Open
          type: AWS
    expectedError: "AWS Capacity Reservation preference 'None' or 'Open' is incompatible with specifying a Capacity Reservation ID"

  - name: when marketType is CapacityBlocks without capacity reservation ID it should fail
