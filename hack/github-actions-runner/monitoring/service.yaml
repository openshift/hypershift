apiVersion: v1
kind: Service
metadata:
  name: arc-controller-metrics
  namespace: arc-systems
  labels:
    app.kubernetes.io/name: arc-controller
spec:
  selector:
    app.kubernetes.io/name: gha-rs-controller
  ports:
    - name: metrics
      port: 8080
      targetPort: 8080
      protocol: TCP
---
apiVersion: v1
kind: Service
metadata:
  name: arc-listener-metrics
  namespace: arc-systems
  labels:
    app.kubernetes.io/name: arc-listener
spec:
  selector:
    app.kubernetes.io/component: runner-scale-set-listener
  ports:
    - name: metrics
      port: 8080
      targetPort: 8080
      protocol: TCP
---
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: arc-metrics-allow-prometheus
  namespace: arc-systems
spec:
  podSelector:
    matchExpressions:
      - key: app.kubernetes.io/component
        operator: In
        values:
          - controller-manager
          - runner-scale-set-listener
  policyTypes:
    - Ingress
  ingress:
    - from:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: openshift-user-workload-monitoring
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: openshift-monitoring
      ports:
        - port: 8080
          protocol: TCP
