# crdify configuration for HyperShift CRD schema checks.
# See https://sigs.k8s.io/crdify for configuration reference.
#
# crdify checks the following by default (no configuration needed):
#   - Field removals (removing an existing field from the schema)
#   - Type changes (changing a field's type, e.g. string → integer)
#   - New required fields (adding a field to the required list)
#   - Scope changes (changing between Namespaced and Cluster)
#   - Stored version removal (removing a version that is marked as stored)
#
# HyperShift CRDs embed openshift/api types (spec.configuration.*), so
# bumping openshift/api naturally introduces schema changes that have
# already been reviewed upstream. The policies below reflect this:
#
#   - enum additions: allowed (clients must tolerate unknown values)
#   - description changes: warn-only (text changes are never API-breaking)
#   - new min/max constraints: warn-only (API server ratchets existing data)
#   - field removals: warn-only (vendored type restructuring, reviewed upstream)
#   - type changes: warn-only (accompanies field removals in vendored types)
#
# Remaining defaults (Error): required, scope, storedVersionRemoval, pattern,
# nullable, default.
#
# crdify doesn't have comparators for all schema fields yet (e.g.
# XValidations/CEL rules), so unhandled diffs are warnings rather than
# errors. Reviewers catch actual breaking changes.
unhandledEnforcement: Warn

validations:
  - name: enum
    enforcement: Warn
    configuration:
      additionPolicy: Allow
  - name: description
    enforcement: Warn
  - name: existingFieldRemoval
    enforcement: Warn
  - name: type
    enforcement: Warn
  - name: minLength
    enforcement: Warn
  - name: maxLength
    enforcement: Warn
  - name: minItems
    enforcement: Warn
  - name: maxItems
    enforcement: Warn
  - name: minimum
    enforcement: Warn
  - name: maximum
    enforcement: Warn
