name: CPO Container Sync (Reusable)

on:
  workflow_call:

permissions:
  contents: read

jobs:
  cpo-container-sync:
    name: CPO Container Sync
    runs-on: arc-runner-set
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1
        with:
          persist-credentials: false
      - run: make cpo-container-sync
