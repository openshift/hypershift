name: Update CI Job Registry

on:
  schedule:
    - cron: "23 4 * * *"  # nightly at 04:23 UTC
  workflow_dispatch: {}

permissions:
  contents: read

jobs:
  update-registry:
    runs-on: arc-runner-set
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          token: ${{ secrets.COMMUNITY_FORK_TOKEN }}

      - name: Install PyYAML
        run: pip install --break-system-packages pyyaml

      - name: Regenerate job registry
        id: generate
        run: |
          python3 hack/ci/update-job-registry.py --output .chai-bot/ci-status-jobs.yaml 2>&1 | grep '^release_sha=' >> "$GITHUB_OUTPUT"

      - name: Check for changes
        id: diff
        run: |
          if git diff --quiet -I '^# Last generated:' .chai-bot/ci-status-jobs.yaml; then
            echo "changed=false" >> "$GITHUB_OUTPUT"
          else
            echo "changed=true" >> "$GITHUB_OUTPUT"
          fi

      - name: Create pull request
        if: steps.diff.outputs.changed == 'true'
        env:
          GH_TOKEN: ${{ secrets.COMMUNITY_FORK_TOKEN }}
          RELEASE_SHA: ${{ steps.generate.outputs.release_sha }}
        run: |
          BRANCH="automated/update-ci-job-registry-${RELEASE_SHA}"
          FORK="hypershift-community"
          git remote add community https://github.com/${FORK}/hypershift.git
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git checkout -B "${BRANCH}"
          git add .chai-bot/ci-status-jobs.yaml
          git commit -m "chore(ci): update periodic job registry (release@${RELEASE_SHA})"
          git push community "${BRANCH}"

          gh pr create \
            --title "NO-JIRA: update periodic job registry" \
            --body "Auto-generated by the nightly \`update-ci-job-registry\` workflow from [openshift/release@${RELEASE_SHA}](https://github.com/openshift/release/commit/${RELEASE_SHA}).

          Review the diff to see which jobs were added or removed." \
            --head "${FORK}:${BRANCH}"
