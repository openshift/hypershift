name: Envtest OCP API Validation

on:
  push:
    branches: [main]
    # TODO: uncomment paths filter after validating workflow
    # paths:
    #   - 'api/**'
    #   - 'test/envtest/**'
    #   - 'cmd/install/assets/hypershift-operator/tests/**'
  pull_request:
    branches: [main]
    # paths:
    #   - 'api/**'
    #   - 'test/envtest/**'
    #   - 'cmd/install/assets/hypershift-operator/tests/**'
  workflow_dispatch: {}

jobs:
  envtest-ocp:
    name: Envtest OCP (K8s ${{ matrix.version }})
    runs-on: arc-runner-set
    timeout-minutes: 15
    strategy:
      fail-fast: false
      matrix:
        # OCP 4.17=1.30, 4.18=1.31, 4.19=1.32, 4.20=1.33, 4.21=1.34, 4.22=1.35
        version: ["1.30.3", "1.31.2", "1.32.1", "1.33.2", "1.34.1", "1.35.1"]
    steps:
      - uses: actions/checkout@v6
      - run: make test-envtest-ocp ENVTEST_OCP_K8S_VERSIONS="${{ matrix.version }}"
