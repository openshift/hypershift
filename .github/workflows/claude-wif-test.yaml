name: Test Claude Code WIF Auth

on:
  issue_comment:
    types: [created]
  workflow_dispatch: {}

permissions:
  id-token: write
  contents: read
  pull-requests: read

jobs:
  test-wif:
    if: >-
      github.event_name == 'workflow_dispatch' ||
      (github.event.issue.pull_request &&
       contains(github.event.comment.body, '/test-wif') &&
       (github.event.comment.author_association == 'MEMBER' ||
        github.event.comment.author_association == 'OWNER' ||
        github.event.comment.author_association == 'COLLABORATOR'))
    runs-on: arc-runner-set
    timeout-minutes: 10
    env:
      HOME: /tmp
    steps:
      - name: Get PR ref
        if: github.event_name == 'issue_comment'
        id: pr
        run: |
          curl -fsSL -H "Authorization: token ${{ github.token }}" \
            "https://api.github.com/repos/${{ github.repository }}/pulls/${{ github.event.issue.number }}" > /tmp/pr.json
          echo "ref=$(jq -r '.head.sha' /tmp/pr.json)" >> "$GITHUB_OUTPUT"
          echo "repo=$(jq -r '.head.repo.full_name' /tmp/pr.json)" >> "$GITHUB_OUTPUT"

      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          ref: ${{ steps.pr.outputs.ref || github.sha }}
          repository: ${{ steps.pr.outputs.repo || github.repository }}
          persist-credentials: false

      - name: Authenticate to GCP via WIF
        uses: google-github-actions/auth@c200f3691d83b41bf9bbd8638997a462592937ed # v2
        with:
          project_id: hosted-control-planes
          service_account: claude-gha@hosted-control-planes.iam.gserviceaccount.com
          workload_identity_provider: projects/21066242673/locations/global/workloadIdentityPools/itpc-identity-pool/providers/github-com

      - name: Install Claude Code
        run: |
          curl -fsSL https://claude.ai/install.sh | bash
          echo "$HOME/.local/bin" >> $GITHUB_PATH

      - name: Set up ai-helpers plugins
        run: |
          git clone --depth 1 https://github.com/openshift-eng/ai-helpers.git /tmp/ai-helpers
          mkdir -p "$HOME/.claude/plugins"
          printf '%s\n' '{"enabledPlugins":{"hello-world@ai-helpers":true,"ai-sbom@ai-helpers":true,"jira@ai-helpers":true,"ci@ai-helpers":true}}' > "$HOME/.claude/settings.json"
          printf '%s\n' '{"ai-helpers":{"source":{"source":"directory","path":"/tmp/ai-helpers"},"installLocation":"/tmp/ai-helpers","lastUpdated":"2025-10-27T12:00:00.000Z"}}' > "$HOME/.claude/plugins/known_marketplaces.json"

      - name: Test Claude Code
        env:
          CLAUDE_CODE_USE_VERTEX: "1"
          CLOUD_ML_REGION: global
          ANTHROPIC_VERTEX_PROJECT_ID: hosted-control-planes
        run: |
          claude --version
          claude -p "Generate an AI SBOM for this session." --model claude-opus-4-6 --max-turns 1 | tee /tmp/claude-output.txt
          if grep -qi "ai-assisted\|ai.sbom\|sbom" /tmp/claude-output.txt; then
            echo "Plugin verified: ai-sbom plugin executed successfully"
          else
            echo "ERROR: ai-sbom plugin output not detected"
            cat /tmp/claude-output.txt
            exit 1
          fi
