name: Docs Preview

on:
  pull_request_target:
    branches: [main]
    paths:
      - 'docs/**'

permissions:
  contents: read
  deployments: write

jobs:
  build:
    name: Build Docs
    runs-on: arc-runner-set
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v6
        with:
          ref: ${{ github.event.pull_request.head.sha }}
      - uses: actions/setup-python@v5
        with:
          python-version: '3.x'
        env:
          PIP_CACHE_DIR: ${{ runner.temp }}/.pip-cache
      - run: pip install -r docs/requirements.txt
        env:
          PIP_CACHE_DIR: ${{ runner.temp }}/.pip-cache
      - name: Build documentation
        run: mkdocs build --strict
        working-directory: docs
      - uses: actions/upload-artifact@v4
        with:
          name: docs-site
          path: docs/site

  deploy:
    name: Deploy Preview
    needs: build
    runs-on: arc-runner-set
    timeout-minutes: 5
    environment:
      name: docs-preview
      url: https://pr-${{ github.event.pull_request.number }}.hypershift.pages.dev
    steps:
      - uses: actions/download-artifact@v4
        with:
          name: docs-site
          path: site
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
        env:
          npm_config_cache: ${{ runner.temp }}/.npm
      - name: Deploy to Cloudflare Pages
        env:
          npm_config_cache: ${{ runner.temp }}/.npm
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          command: pages deploy site --project-name=hypershift --branch=pr-${{ github.event.pull_request.number }} --commit-dirty=true
