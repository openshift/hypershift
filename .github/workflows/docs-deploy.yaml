name: Docs Deploy Preview

on:
  workflow_run:
    workflows: ["Docs Build"]
    types:
      - completed

permissions:
  actions: read
  deployments: write

jobs:
  deploy:
    name: Deploy Preview
    if: github.event.workflow_run.conclusion == 'success'
    runs-on: arc-runner-set
    timeout-minutes: 5
    continue-on-error: true
    environment:
      name: docs-preview
    steps:
      - uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          name: docs-site
          path: site
          run-id: ${{ github.event.workflow_run.id }}
          github-token: ${{ github.token }}
      - name: Read PR number
        id: pr
        run: echo "number=$(cat site/pr-number.txt)" >> "$GITHUB_OUTPUT"
      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: '20'
        env:
          npm_config_cache: ${{ runner.temp }}/.npm
      - name: Deploy to Cloudflare Pages
        env:
          npm_config_cache: ${{ runner.temp }}/.npm
        uses: cloudflare/wrangler-action@da0e0dfe58b7a431659754fdf3f186c529afbe65 # v3.14.1
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          command: pages deploy site --project-name=hypershift --branch=pr-${{ steps.pr.outputs.number }} --commit-dirty=true
