name: Codespell (Reusable)

on:
  workflow_call:

permissions:
  contents: read

jobs:
  codespell:
    name: Codespell
    runs-on: arc-runner-set
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false
      - run: make verify-codespell
